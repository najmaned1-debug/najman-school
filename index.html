function LiveClassActivity({db}){
  const [classes,setClasses]=useState([]);
  const [timetable,setTimetable]=useState([]);
  const [loading,setLoading]=useState(true);
  const [now,setNow]=useState(new Date());

  useEffect(()=>{
    const t=setInterval(()=>setNow(new Date()),30000); // refresh every 30s
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{(async()=>{
    const [{data:cls},{data:tt}]=await Promise.all([
      db.from("classes").select("*").order("name"),
      db.from("timetable").select("*,subjects(name)")
    ]);
    setClasses(cls||[]);
    setTimetable(tt||[]);
    setLoading(false);
  })();},[]);

  const today=DAY_NAMES[now.getDay()];
  const isWeekend=now.getDay()===0||now.getDay()===6;

  const rows=classes.map(c=>{
    const allPeriods=getPeriodsForClass(c.name);
    const lessonPeriods=allPeriods.filter(p=>p!=="Break"&&p!=="Lunch");
    let current=null;
    let onBreak=false;
    for(const p of lessonPeriods){
      if(periodStatus(p,now)==="now"){
        const entry=timetable.find(e=>e.class_id==c.id&&e.day===today&&e.period===p);
        current={period:p,subject:entry?.subjects?.name||null,teacher:entry?.teacher||null,room:entry?.room||null};
        break;
      }
    }
    if(!current){
      // Check if current time falls inside a Break/Lunch slot's neighbouring window
      const idx=allPeriods.findIndex((p,i)=>{
        if(p!=="Break"&&p!=="Lunch") return false;
        const prev=allPeriods[i-1],next=allPeriods[i+1];
        if(periodStatus(prev,now)==="past"&&next&&periodStatus(next,now)==="future") return true;
        return false;
      });
      if(idx>=0) onBreak=true;
    }
    return {cls:c,current,onBreak};
  });

  const active=rows.filter(r=>r.current);
  const idle=rows.filter(r=>!r.current);

  return <div className="card">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <div style={{fontWeight:800,fontSize:15}}>🔴 Live School Activity</div>
      <div style={{fontSize:11,color:C.muted,fontWeight:700}}>{now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</div>
    </div>
    {loading&&<div style={{fontSize:13,color:C.muted}}>Inapakia...</div>}
    {!loading&&isWeekend&&<div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"14px 0"}}>🌤️ Today is {today==="Saturday"?"Saturday":"Sunday"} — no classes</div>}
    {!loading&&!isWeekend&&classes.length===0&&<div style={{fontSize:13,color:C.muted}}>No classes set up yet</div>}
    {!loading&&!isWeekend&&classes.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
      {active.map(r=>(
        <div key={r.cls.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.25)",borderRadius:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:C.green,flexShrink:0,boxShadow:"0 0 0 3px rgba(34,197,94,.2)"}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:800}}>{r.cls.name}</div>
            <div style={{fontSize:11,color:C.textSoft}}>
              {r.current.subject?`📖 ${r.current.subject}`:"Somo halijawekwa"}
              {r.current.teacher?` • 👤 ${r.current.teacher}`:""}
              {r.current.room?` • 🚪 ${r.current.room}`:""}
            </div>
          </div>
          <div style={{fontSize:10,color:C.green,fontWeight:800,flexShrink:0}}>{r.current.period}</div>
        </div>
      ))}
      {idle.length>0&&<div style={{marginTop:active.length>0?4:0}}>
        {active.length>0&&<div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:4}}>Break / Outside class hours</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {idle.map(r=>(
            <div key={r.cls.id} style={{fontSize:11,color:r.onBreak?C.accent:C.textSoft,padding:"4px 9px",background:r.onBreak?"rgba(245,166,35,.1)":"#151d30",borderRadius:6,fontWeight:700}}>{r.onBreak?"☕ ":""}{r.cls.name}</div>
          ))}
        </div>
      </div>}
    </div>}
  </div>;
}

// ── LESSON LOG (teacher fills what they taught, per period/day) ──
function LessonLog({db,user}){
  const teacherName=user?.profile?.full_name||user?.email||"";
  const [classes,setClasses]=useState([]);
  const [timetable,setTimetable]=useState([]);
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selDate,setSelDate]=useState(fmtDate());
  const [saving,setSaving]=useState(null); // key of row being saved
  const [drafts,setDrafts]=useState({}); // key -> {topic,notes}
  const [msg,setMsg]=useState("");

  const dayName=DAY_NAMES[new Date(selDate+"T00:00:00").getDay()];

  useEffect(()=>{(async()=>{
    setLoading(true);
    const [{data:cls},{data:tt}]=await Promise.all([
      db.from("classes").select("*").order("name"),
      db.from("timetable").select("*,subjects(name)").eq("teacher",teacherName)
    ]);
    setClasses(cls||[]);
    setTimetable(tt||[]);
    setLoading(false);
  })();},[teacherName]);

  useEffect(()=>{(async()=>{
    const {data}=await db.from("lesson_logs").select("*").eq("log_date",selDate).eq("teacher_name",teacherName);
    setLogs(data||[]);
  })();},[selDate,teacherName]);

  // My periods for the selected day, across all my classes
  const myRows=[];
  timetable.filter(e=>e.day===dayName).forEach(e=>{
    const cls=classes.find(c=>c.id==e.class_id);
    if(!cls) return;
    myRows.push({key:e.class_id+"__"+e.period,class_id:e.class_id,className:cls.name,period:e.period,subject:e.subjects?.name||"",teacher:e.teacher});
  });
  myRows.sort((a,b)=>{
    const pa=getPeriodsForClass(a.className).indexOf(a.period);
    const pb=getPeriodsForClass(b.className).indexOf(b.period);
    return pa-pb;
  });

  const getLog=key=>logs.find(l=>l.class_id+"__"+l.period===key);
  const getDraft=(key,field,fallback)=>{
    if(drafts[key]&&drafts[key][field]!==undefined) return drafts[key][field];
    const existing=getLog(key);
    return existing?existing[field]||"":fallback||"";
  };
  const setDraft=(key,field,val)=>setDrafts(d=>({...d,[key]:{...d[key],[field]:val}}));

  const saveLog=async(row)=>{
    setSaving(row.key);
    const topic=getDraft(row.key,"topic_taught","");
    const notes=getDraft(row.key,"notes","");
    if(!topic.trim()){alert("Write what you taught first!");setSaving(null);return;}
    const existing=getLog(row.key);
    const payload={
      class_id:row.class_id,class_name:row.className,day:dayName,period:row.period,
      subject:row.subject,teacher_name:teacherName,log_date:selDate,
      topic_taught:topic,notes:notes,logged_at:new Date().toISOString()
    };
    if(existing){await db.from("lesson_logs").update(payload).eq("id",existing.id);}
    else{await db.from("lesson_logs").insert(payload);}
    const {data}=await db.from("lesson_logs").select("*").eq("log_date",selDate).eq("teacher_name",teacherName);
    setLogs(data||[]);
    setSaving(null);
    setMsg("Imehifadhiwa!");setTimeout(()=>setMsg(""),2000);
  };

  return <div>
    <div style={{fontSize:19,fontWeight:900,fontFamily:"'Playfair Display',serif",marginBottom:4}}>📔 Lesson Log — Nilichofundisha</div>
    <div style={{fontSize:13,color:C.textSoft,marginBottom:14}}>Fill in what you taught for each of your periods</div>
    {msg&&<div className="success-box">{msg}</div>}
    <div className="card" style={{marginBottom:14}}>
      <label className="label">Tarehe</label>
      <input className="input" type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{maxWidth:200}}/>
      <div style={{fontSize:12,color:C.muted,marginTop:4}}>Siku: {dayName}</div>
      <div style={{fontSize:11,color:C.accent,marginTop:6}}>ℹ️ Periods shown here come from the Timetable where your name ({teacherName||"—"}) is set as "Teacher". If no periods appear, ask Admin to confirm your name is entered correctly in the Timetable.</div>
    </div>
    {loading&&<Spinner/>}
    {!loading&&myRows.length===0&&<div className="card text-center" style={{padding:30,color:C.muted}}>You have no periods in the timetable for this day (or your name is not set in Timetable → Teacher).</div>}
    {!loading&&myRows.map(row=>{
      const existing=getLog(row.key);
      return <div key={row.key} className="card" style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
          <div>
            <span style={{fontWeight:900,fontSize:14}}>{row.className}</span>
            <span style={{fontSize:12,color:C.textSoft,marginLeft:8}}>{row.subject} • {row.period}</span>
          </div>
          {existing&&<span style={{fontSize:11,color:C.green,fontWeight:800}}>✅ Imejazwa</span>}
        </div>
        <div className="mb-8">
          <label className="label">Nilichofundisha *</label>
          <input className="input" value={getDraft(row.key,"topic_taught")} placeholder="e.g. Water cycle" onChange={e=>setDraft(row.key,"topic_taught",e.target.value)}/>
        </div>
        <div className="mb-8">
          <label className="label">Additional Notes (optional)</label>
          <textarea className="input" rows={2} value={getDraft(row.key,"notes")} placeholder="Comments, challenges, extra work..." onChange={e=>setDraft(row.key,"notes",e.target.value)}/>
        </div>
        <button className="btn btn-orange" onClick={()=>saveLog(row)} disabled={saving===row.key}>{saving===row.key?"...":existing?"Sasisha":"Hifadhi"}</button>
      </div>;
    })}
  </div>;
}

// ── GLOBAL SMS HELPER ──────────────────────────────────────
// nextsms_key stored as "username:password"
// NextSMS Basic Auth = btoa("username:password") — NO extra colon
function normPhone(p){
  if(!p) return null;
  let n=p.replace(/\s/g,"").replace(/^\+/,"");
  if(n.startsWith("0")) n="255"+n.substring(1);
  return n;
}
async function sendSMS(phone,message){
  if(!phone||!message) return {ok:false,error:"Missing phone or message"};
  const to=normPhone(phone);
  if(!to) return {ok:false,error:"Invalid phone: "+phone};
  
  // Retry logic — try up to 2 times
  for(let attempt=1; attempt<=2; attempt++){
    try{
      const {data,error}=await db.rpc("send_sms",{
        p_to:to,
        p_message:message
      });
      if(error){
        console.warn(`SMS attempt ${attempt} error:`,error.message);
        if(attempt===2){
          db.from("sms_log").insert({
            recipient_name:"",
            phone:to,
            message:message,
            status:"failed",
            error_detail:error.message||"RPC error",
            sent_at:new Date().toISOString()
          }).then(()=>{}).catch(()=>{});
          return {ok:false,error:error.message};
        }
        await new Promise(r=>setTimeout(r,1500));
        continue;
      }
      const ok=data?.ok===true;
      console.log(`📲 SMS [${attempt}]`,to,ok?"✅":"❌",data);
      // Detect common pending-Sender-ID failure so the UI can explain it clearly
      let errDetail=null;
      if(!ok){
        const bodyStr=JSON.stringify(data?.body||data||"").toLowerCase();
        if(bodyStr.includes("sender")||bodyStr.includes("sender_id")||bodyStr.includes("not approved")||bodyStr.includes("pending")){
          errDetail="Sender ID 'NAJMAN' is still pending approval from NextSMS. Use your phone number as the Sender ID for now (see SMS Settings).";
        }else{
          errDetail=JSON.stringify(data?.body||data||"Unknown error").slice(0,300);
        }
      }
      // Log to sms_log table
      db.from("sms_log").insert({
        recipient_name:"",
        phone:to,
        message:message,
        status:ok?"sent":"failed",
        error_detail:errDetail,
        sent_at:new Date().toISOString()
      }).then(()=>{}).catch(()=>{});
      return {ok,status:data?.status,body:JSON.stringify(data?.body||data),error:errDetail};
    }catch(e){
      console.error(`SMS attempt ${attempt} exception:`,e);
      if(attempt===2){
        db.from("sms_log").insert({
          recipient_name:"",
          phone:to,
          message:message,
          status:"failed",
          error_detail:String(e).slice(0,300),
          sent_at:new Date().toISOString()
        }).then(()=>{}).catch(()=>{});
        return {ok:false,error:String(e)};
      }
      await new Promise(r=>setTimeout(r,1500));
    }
  return {ok:false,error:"Failed after retries"};
  }
}

function BulkSMS({db,user}){
  const {data:students} = useDB("students",{order:"name",eq:{status:"Active"}});
  const [selected,setSelected] = useState([]);
  const [message,setMessage] = useState("");
  const [sending,setSending] = useState(false);
  const [results,setResults] = useState([]);
  const [apiKey] = useState(()=>localStorage.getItem("nextsms_key")||"");
  const [sender] = useState(()=>localStorage.getItem("nextsms_sender")||"NAJMANshule");

  const sendAll = async() => {
    const targets = students.filter(s=>selected.includes(s.id)&&s.phone);
    if(!targets.length){alert("Select students with phone numbers!");return;}
    if(!message.trim()){alert("Type a message first!");return;}
    setSending(true);const res=[];
    for(const s of targets){
      const r=await sendSMS(s.phone,message);
      res.push({name:s.name,ok:r.ok,status:r.status||r.error||"?"});
      await db.from("sms_log").insert({recipient_name:s.name,phone:s.phone,message,status:r.ok?"sent":"failed",sent_at:new Date().toISOString()});
    }
    setResults(res);setSending(false);
  };

  return <div>
    <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif",marginBottom:18}}>💬 Bulk SMS</div>
    <div className="card mb-12" style={{background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.35)",padding:"8px 12px"}}>
      <span style={{fontSize:13,color:C.accent,fontWeight:700}}>⏳ Sender ID "NAJMAN" still pending with NextSMS</span> <span style={{fontSize:13,color:C.textSoft}}>— baadhi ya SMS zinaweza kushindwa. Angalia SMS History kwa sababu.</span>
    </div>
    <div className="card mb-12">
      <label className="label">Message</label>
      <textarea className="input" style={{height:80,resize:"vertical"}} value={message} onChange={e=>setMessage(e.target.value)} placeholder="Type your message..."/>
      <div style={{fontSize:15,color:C.muted,marginTop:4}}>{message.length} characters</div>
    </div>
    <div className="card mb-12">
      <div className="flex justify-between align-center mb-10">
        <div style={{fontWeight:700}}>Select Recipients</div>
        <div className="flex gap-6">
          <button className="btn-ghost" style={{fontSize:15,padding:"5px 9px"}} onClick={()=>setSelected(students.map(s=>s.id))}>All</button>
          <button className="btn-ghost" style={{fontSize:15,padding:"5px 9px"}} onClick={()=>setSelected([])}>None</button>
        </div>
      </div>
      {students.map(s=><div key={s.id} className="flex align-center gap-8" style={{padding:"7px 0",borderBottom:"1px solid #1f2e47"}}>
        <input type="checkbox" checked={selected.includes(s.id)} onChange={()=>setSelected(p=>p.includes(s.id)?p.filter(x=>x!==s.id):[...p,s.id])}/>

      </div>)}

    <div className="flex justify-between align-center">
      <div style={{fontSize:15,color:C.textSoft}}>Selected: <strong style={{color:C.accent}}>{selected.length}</strong></div>
      <button className="btn btn-green" style={{fontSize:15,padding:"9px 20px"}} onClick={sendAll} disabled={sending}>{sending?"⏳ Sending...":"📤 Send SMS"}</button>

  </div>;

// ── SimpleCRUD — generic table editor ─────────────────
function SimpleCRUD({db,table,title,fields}){
  const {data,loading,refresh}=useDB(table,{order:fields[0]?.k||"id"});
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState("");
  const blank=()=>{const o={};fields.forEach(f=>{o[f.k]="";});return o;};
  const [form,setForm]=useState(blank());
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=async()=>{
    const reqField=fields.find(f=>f.required);
    if(reqField&&!String(form[reqField.k]||"").trim()){alert(`${reqField.l} is required`);return;}
    const d={};
    fields.forEach(f=>{ d[f.k]=f.type==="number"?(Number(form[f.k])||0):(form[f.k]||""); });
    if(editId){await db.from(table).update(d).eq("id",editId);}
    else{await db.from(table).insert(d);}
    refresh();setModal(false);setEditId(null);setForm(blank());
  };
  const del=async(id)=>{
    if(!confirm("Delete this record?"))return;
    await db.from(table).delete().eq("id",id);
    refresh();
  };
  const edit=(row)=>{
    const f={};
    fields.forEach(x=>{f[x.k]=row[x.k]??"";});
    setForm(f);setEditId(row.id);setModal(true);
  };
  const firstKey=fields[0]?.k;
  const filtered=search.trim()?data.filter(row=>String(row[firstKey]||"").toLowerCase().includes(search.toLowerCase())):data;

  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>{title}</div>
      <button className="btn" onClick={()=>{setForm(blank());setEditId(null);setModal(true);}}>+ Add</button>
    </div>
    <div className="card flex gap-8 flex-wrap mb-10" style={{marginBottom:10}}>
      <input className="input" style={{flex:1,minWidth:140}} placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>
    {loading?<Spinner/>:<div className="card" style={{padding:0,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}>
        <table className="table">
          <thead><tr>{fields.map(f=><th key={f.k}>{f.l}</th>)}<th></th></tr></thead>
          <tbody>{filtered.map(row=><tr key={row.id}>
            {fields.map(f=><td key={f.k}>{f.type==="number"?Number(row[f.k]||0).toLocaleString():(row[f.k]||"—")}</td>)}
            <td style={{display:"flex",gap:4}}>
              <button className="btn-ghost" style={{padding:"3px 8px",fontSize:12}} onClick={()=>edit(row)}>✏️</button>
              <button className="btn-ghost" style={{padding:"3px 8px",fontSize:12,color:C.red}} onClick={()=>del(row.id)}>🗑️</button>
            </td>
          </tr>)}</tbody>
        </table>
      </div>
      {filtered.length===0&&<div style={{padding:16,textAlign:"center",color:C.muted}}>No records found</div>}
    </div>}
    {modal&&<div className="overlay"><div className="modal">
      <div style={{fontWeight:900,fontSize:16,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>{editId?"✏️ Edit":"+ Add"} {title}</div>
      <div className="grid-2">
        {fields.map(f=>{
          if(f.type==="select") return <div key={f.k}><Select label={f.l+(f.required?" *":"")} value={form[f.k]} onChange={v=>F(f.k,v)} options={f.opts||[]}/></div>;
          if(f.type==="textarea") return <div key={f.k} className="grid-full"><label className="label">{f.l}{f.required?" *":""}</label><textarea className="input" style={{height:60,resize:"vertical"}} value={form[f.k]||""} onChange={e=>F(f.k,e.target.value)}/></div>;
          return <div key={f.k}><Field label={f.l+(f.required?" *":"")} value={form[f.k]} onChange={v=>F(f.k,v)} type={f.type||"text"}/></div>;
        })}
      </div>
      <div className="flex gap-8 justify-between" style={{marginTop:14}}>
        <button className="btn-ghost" onClick={()=>{setModal(false);setEditId(null);}}>Cancel</button>
        <button className="btn" onClick={save}>💾 Save</button>
      </div>
    </div></div>}
  </div>;
}

  const calcGrade=m=>m>=80?"A":m>=70?"B":m>=60?"C":m>=50?"D":"F";
  const gc=g=>({A:C.green,B:C.teal,C:C.blue,D:C.accent,F:C.red}[g]||C.muted);

  const saveExam=async()=>{
    if(!eForm.name.trim())return;
    await db.from("examinations").insert({...eForm,total_marks:Number(eForm.total_marks)||100,created_by:user.id});
    load();setModal(false);setEForm({name:"",class_name:"",term:"Term 1",exam_date:fmtDate(),total_marks:"100"});
  };

  const calcDivision=avg=>avg>=80?"Daraja I (A)":avg>=60?"Daraja II (B)":avg>=50?"Daraja III (C)":avg>=40?"Daraja IV (D)":"Daraja V (F)";

  const saveResult=async()=>{
    if(!rForm.student_id||!rForm.subject_id||rForm.marks_obtained==="")return;
    const marks=Number(rForm.marks_obtained);
    const grade=calcGrade(marks);
    await db.from("exam_results").upsert({
      ...rForm,exam_id:selExam.id,marks_obtained:marks,grade
    },{onConflict:"student_id,exam_id,subject_id"});

    // ── AUTO: Calculate GPA + Division before saving ──
    const {data:allRes}=await db.from("exam_results").select("marks_obtained,student_id").eq("exam_id",selExam.id).eq("student_id",rForm.student_id);
    if(allRes&&allRes.length>0){
      const avg=Math.round(allRes.reduce((s,r)=>s+r.marks_obtained,0)/allRes.length);
      const div=calcDivision(avg);
      const gr=calcGrade(avg);
      // Update student summary
      await db.from("exam_results").update({division:div,average:avg}).eq("exam_id",selExam.id).eq("student_id",rForm.student_id);
    }

    // ── AUTO: Arrange class seating ─────────────────
    const {data:examResults}=await db.from("exam_results").select("student_id,marks_obtained").eq("exam_id",selExam.id);
    if(examResults){
      const totals={};
      examResults.forEach(r=>{if(!totals[r.student_id])totals[r.student_id]=[];totals[r.student_id].push(r.marks_obtained);});
      const sorted=Object.entries(totals).map(([sid,ms])=>({sid,avg:Math.round(ms.reduce((a,b)=>a+b,0)/ms.length)})).sort((a,b)=>b.avg-a.avg);
      for(let i=0;i<sorted.length;i++){
        await db.from("exam_results").update({position:i+1}).eq("exam_id",selExam.id).eq("student_id",sorted[i].sid).limit(1);
      }
    }

    // ── AUTO: SMS to parent when results saved ──────────
    const st = students.find(s=>s.id===rForm.student_id);
    if(st?.phone){
      const grade=calcGrade(Number(rForm.marks_obtained));
      const msg=`Dear ${st.parent||"Parent"}, ${st.name}'s result for ${selExam.name}: ${rForm.marks_obtained}/${selExam.total_marks} (${grade}). Najman School`;
      sendSMS(st.phone,msg).catch(()=>{});

    load();setResModal(false);setRForm({student_id:"",subject_id:"",marks_obtained:"",remarks:""});
  };

  const delExam=async(id)=>{if(!confirm("Delete exam?"))return;await db.from("examinations").delete().eq("id",id);load();};

      studentTotals[r.student_id].count++;

    {modal&&<div className="overlay"><div className="modal">

// ── STAFF ATTENDANCE ──────────────────────────────────
function StaffAttendance({db,user}){
  const {data:staff}=useDB("staff",{order:"name",eq:{status:"Active"}});
  const today=fmtDate();
  const [date,setDate]=useState(today);
  const [att,setAtt]=useState([]);
  const loadAtt=async()=>{const{data}=await db.from("staff_attendance").select("*").eq("att_date",date);setAtt(data||[]);};
  useEffect(()=>{loadAtt();},[date]);
  const getStatus=id=>att.find(a=>a.staff_id===id)?.status||null;
  const now=()=>new Date().toTimeString().slice(0,5);
  const mark=async(id,status)=>{
    const existing=att.find(a=>a.staff_id===id);
    const rec={staff_id:id,att_date:date,status};
    if(status==="P"&&!existing?.check_in) rec.check_in=now();
    await db.from("staff_attendance").upsert(rec,{onConflict:"staff_id,att_date"});
    loadAtt();
  };
  const checkOut=async(id)=>{
    await db.from("staff_attendance").update({check_out:now()}).eq("staff_id",id).eq("att_date",date);
    loadAtt();
  };
  const markAll=async(status)=>{
    const t=now();
    await db.from("staff_attendance").upsert(staff.map(s=>({staff_id:s.id,att_date:date,status,check_in:status==="P"?t:null})),{onConflict:"staff_id,att_date"});
    loadAtt();
  };
  const present=att.filter(a=>a.status==="P").length;
  const absent=att.filter(a=>a.status==="A").length;
  const printAtt=()=>{
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>Staff Attendance</title><style>body{font-family:Arial;padding:20px;}h2,h3{text-align:center;}table{width:100%;border-collapse:collapse;font-size:12px;}th,td{border:1px solid #ccc;padding:6px 10px;}th{background:#f5a623;}.P{color:green;font-weight:700;}.A{color:red;font-weight:700;}@page{size:A4;margin:14mm;}</style></head><body>
    <h2>NAJMAN EDUCATION CENTRE</h2><h3>Staff Attendance — ${date}</h3>
    <p style="text-align:center">Present: <b>${present}</b> | Absent: <b>${absent}</b> | Total: <b>${staff.length}</b></p>
    <table><thead><tr><th>#</th><th>Name</th><th>Role</th><th>Reg No</th><th>Status</th><th>Signature</th></tr></thead><tbody>
    ${staff.map((s,i)=>{const st=getStatus(s.id);return`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.role}</td><td>${s.reg_no||"—"}</td><td class="${st||''}">${st==="P"?"Present":st==="A"?"Absent":"—"}</td><td></td></tr>`;}).join("")}
    </tbody></table></body></html>`);
    w.document.close();setTimeout(()=>w.print(),500);
  };
  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>👨‍🏫 Staff Attendance</div>
      <div className="flex gap-8 flex-wrap">
        <input className="input" style={{width:148}} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        <button className="btn-ghost" style={{fontSize:13,padding:"8px 14px"}} onClick={printAtt}>🖨️ Print</button>
        <button className="btn-ghost" style={{fontSize:13,padding:"8px 14px"}} onClick={()=>exportPDF(
          `Staff Attendance — ${date}`,
          ["#","Name","Rankings","Reg No","Status","Check In","Check Out"],
          staff.map((s,i)=>{const a=att.find(x=>x.staff_id===s.id);return[i+1,s.name,s.role||"—",s.reg_no||"—",a?.status==="P"?"Present":a?.status==="A"?"Absent":"—",a?.check_in||"—",a?.check_out||"—"];}),
          "staff_attendance"
        )}>📄 PDF</button>
      </div>
    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[{l:"Present",v:present,c:C.green},{l:"Absent",v:absent,c:C.red},{l:"Unmarked",v:staff.length-att.length,c:C.muted}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,textAlign:"center"}}><div style={{fontSize:26,fontWeight:900,color:x.c}}>{x.v}</div><div style={{fontSize:15,color:C.textSoft,marginTop:2}}>{x.l}</div></div>
      ))}
    </div>
    <div className="card flex gap-8 mb-10 flex-wrap" style={{marginBottom:0}}>
      <button className="btn btn-green" style={{fontSize:13}} onClick={()=>markAll("P")}>✓ Wote Present</button>
      <button className="btn btn-red" style={{fontSize:15}} onClick={()=>markAll("A")}>✗ All Absent</button>
    </div>
    <div className="card">
      <table className="table">
        <thead><tr>{["#","Name","Role","Reg No","Check In","Check Out","Attendance"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{staff.map((s,i)=>{
          const status=getStatus(s.id);
          return <tr key={s.id} style={{background:status==="P"?"rgba(34,197,94,.06)":status==="A"?"rgba(239,68,68,.06)":"transparent"}}>
            <td>{i+1}</td>
            <td style={{fontWeight:700}}>{s.name}</td>
            <td>{badge("#a855f7",s.role)}</td>
            <td style={{fontSize:15,color:C.accent,fontWeight:700}}>{s.reg_no||"—"}</td>
            <td style={{fontSize:15,color:C.green,fontWeight:700}}>{att.find(a=>a.staff_id===s.id)?.check_in||"—"}</td>
            <td style={{fontSize:15,color:C.red,fontWeight:700}}>{att.find(a=>a.staff_id===s.id)?.check_out||"—"}</td>
            <td>
              <button className="btn btn-green" style={{padding:"5px 10px",marginRight:4,fontSize:15,opacity:status==="P"?1:.4}} onClick={()=>mark(s.id,"P")}>✓ In</button>
              <button className="btn btn-red" style={{padding:"5px 10px",marginRight:4,fontSize:15,opacity:status==="A"?1:.4}} onClick={()=>mark(s.id,"A")}>✗ Out</button>
              {status==="P"&&!att.find(a=>a.staff_id===s.id)?.check_out&&<button className="btn" style={{padding:"5px 10px",fontSize:15,background:"#f97316"}} onClick={()=>checkOut(s.id)}>🚪 Out</button>}
            </td>
          </tr>;
        })}</tbody>
      </table>
      {staff.length===0&&<div style={{padding:16,color:C.muted,textAlign:"center"}}>No staff members found</div>}
    </div>
  </div>;
}

// ── RECEIPT REVIEW PAGE ─────────────────────────────────
function ReceiptReview({db,user}){
  if(!canAccessFees(user)) return <FeeAccessDenied/>;
  const [payments,setPayments]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sq,setSq]=useState("");
  const [fDate,setFDate]=useState("");
  const [fRecorder,setFRecorder]=useState("All");

  const load=()=>{
    setLoading(true);
    db.from("payments").select("*,students(name,class_name,parent,phone)")
      .order("created_at",{ascending:false})
      .then(({data})=>{setPayments(data||[]);setLoading(false);});
  };
  useEffect(()=>{ load(); },[]);

  const recorders = ["All","Admin/Accountant",...Array.from(new Set(payments.filter(p=>p.recorded_by_name).map(p=>p.recorded_by_name)))];

  const filtered = payments.filter(p=>{
    if(sq && !(p.students?.name||"").toLowerCase().includes(sq.toLowerCase())) return false;
    if(fDate && p.payment_date!==fDate) return false;
    if(fRecorder!=="All"){
      if(fRecorder==="Admin/Accountant" && p.recorded_by_name) return false;
      if(fRecorder!=="Admin/Accountant" && p.recorded_by_name!==fRecorder) return false;
    }
    return true;

    <div class="h"><div style="font-size:15px;font-weight:900;">NAJMAN EDUCATION CENTRE</div><div style="font-size:10px;">KISHILI, MWANZA • +255 742 415 133</div></div>
    <div style="text-align:center;font-size:12px;font-weight:700;margin:9px 0;">🧾 PAYMENT RECEIPT (Reprint)</div>
    <div class="row"><b>No:</b><span>${ref}</span></div>
    <div class="row"><b>Student:</b><span>${st.name}</span></div><div class="row"><b>Class:</b><span>${st.class_name}</span></div>
    <div class="row"><b>Parent:</b><span>${st.parent||"—"}</span></div>
    <div class="row"><b>Type:</b><span>${p.fee_type||"—"}</span></div>
    <div class="row"><b>Method:</b><span>${p.method||"—"}</span></div>
    <div class="row"><b>Date:</b><span>${p.payment_date}</span></div>
    <div class="total"><span>Amount Paid:</span><span>TZS ${Number(p.amount).toLocaleString()}</span></div>
    <div class="row"><b>Received By:</b><span>${p.recorded_by_name||"Admin/Accountant"}</span></div>
    <div style="text-align:center;margin-top:14px;"><img src="${stampWithDate(p.payment_date)}" style="width:180px;height:auto;"/></div>
    <div style="text-align:center;font-size:10px;color:#888;margin-top:8px;">Thank you! — IT CAN BE DONE</div>
    </body></html>`);
    w.document.close(); setTimeout(()=>w.print(),500);
  };

  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>🧾 Receipt Review</div>
      <button className="btn-ghost" style={{fontSize:13}} onClick={load}>🔄 Refresh</button>
    </div>
    <div style={{fontSize:13,color:C.muted,marginBottom:12}}>Every receipt issued (Admin, Accountant, and Teachers) appears here immediately after kupokelewa.</div>

      <input className="input" style={{flex:1,minWidth:160}} placeholder="🔍 Search student..." value={sq} onChange={e=>setSq(e.target.value)}/>
      <input className="input" type="date" style={{width:160}} value={fDate} onChange={e=>setFDate(e.target.value)}/>
      <select className="input" style={{width:180}} value={fRecorder} onChange={e=>setFRecorder(e.target.value)}>
        {recorders.map(r=><option key={r}>{r}</option>)}
      </select>
      {(sq||fDate||fRecorder!=="All")&&<button className="btn-ghost" style={{fontSize:13}} onClick={()=>{setSq("");setFDate("");setFRecorder("All");}}>✖ Clear</button>}
    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[{l:"Total Receipts",v:filtered.length,c:C.blue},{l:"Total Amount",v:`TZS ${filtered.reduce((s,p)=>s+Number(p.amount),0).toLocaleString()}`,c:C.green}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1}}><div style={{fontSize:16,fontWeight:900,color:x.c}}>{x.v}</div><div style={{fontSize:15,color:C.textSoft,marginTop:2}}>{x.l}</div></div>

// ── FEE DEBTORS PAGE ─────────────────────────────────
function FeeDebtors({db,user}){
  if(!canAccessFees(user)) return <FeeAccessDenied/>;
  const {data:students}=useDB("students",{order:"name",eq:{status:"Active"}});
  const {data:classes}=useDB("classes",{order:"name"});
  const [payments,setPayments]=useState([]);const [fClass,setFClass]=useState("All");
  useEffect(()=>{db.from("payments").select("*").then(({data})=>setPayments(data||[]));},[]);
  const paidFor=id=>payments.filter(p=>p.student_id===id).reduce((s,p)=>s+p.amount,0);
  const debtFor=id=>Math.max(0,Number(students.find(s=>s.id===id)?.term_fee||0)-paidFor(id));
  const debtors=students.filter(s=>(fClass==="All"||s.class_name===fClass)&&debtFor(s.id)>0).sort((a,b)=>debtFor(b.id)-debtFor(a.id));
  const totalDebt=debtors.reduce((s,st)=>s+debtFor(st.id),0);
  const printDebtors=()=>{
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>Debtors</title><style>body{font-family:Arial;padding:20px;}h2{text-align:center;}table{width:100%;border-collapse:collapse;font-size:12px;}th,td{border:1px solid #ccc;padding:5px 9px;}th{background:#f5a623;}.r{color:#c00;font-weight:700;}@page{size:A4;margin:14mm;}</style></head><body>
    <h2>NAJMAN — Fee Debtors List</h2><p style="text-align:center">${new Date().toLocaleDateString()} | ${debtors.length} students | Total: TZS ${totalDebt.toLocaleString()}</p>
    <table><thead><tr><th>#</th><th>Name</th><th>Adm No</th><th>Class</th><th>Parent</th><th>Phone</th><th>Fee</th><th>Paid</th><th>Balance</th></tr></thead><tbody>
    ${debtors.map((s,i)=>{const p=paidFor(s.id),f=Number(s.term_fee||0);return`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.admission_no||"—"}</td><td>${s.class_name}</td><td>${s.parent||"—"}</td><td>${s.phone||"—"}</td><td>${f.toLocaleString()}</td><td>${p.toLocaleString()}</td><td class="r">${(f-p).toLocaleString()}</td></tr>`;}).join("")}
    </tbody></table></body></html>`);
    w.document.close();setTimeout(()=>w.print(),500);
  };
  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>⚠️ Fee Debtors</div>
      <div className="flex gap-8">
        <select className="input" style={{width:150}} value={fClass} onChange={e=>setFClass(e.target.value)}><option>All</option>{classes.map(c=><option key={c.id}>{c.name}</option>)}</select>
        <button className="btn-ghost" style={{fontSize:15}} onClick={printDebtors}>🖨️ Print List</button>
      </div>
    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[{l:"Total Debtors",v:debtors.length,c:C.red},{l:"Total Outstanding",v:`TZS ${totalDebt.toLocaleString()}`,c:"#f97316"}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1}}><div style={{fontSize:16,fontWeight:900,color:x.c}}>{x.v}</div><div style={{fontSize:15,color:C.textSoft,marginTop:2}}>{x.l}</div></div>
      ))}
    </div>
    <div className="card" style={{background:"#1a0e0e",border:"1px solid rgba(239,68,68,.3)"}}>
      <table className="table">
        <thead><tr>{["#","Name","Adm No","Class","Parent","Phone","Balance"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{debtors.map((s,i)=><tr key={s.id}>
          <td>{i+1}</td><td style={{fontWeight:700}}>{s.name}</td>
          <td style={{fontSize:15,color:C.accent}}>{s.admission_no||"—"}</td>
          <td>{badge(C.blue,s.class_name)}</td>
          <td>{s.parent||"—"}</td><td>{s.phone||"—"}</td>
          <td style={{fontWeight:900,color:C.red}}>TZS {debtFor(s.id).toLocaleString()}</td>
        </tr>)}</tbody>
      </table>
      {debtors.length===0&&<div style={{padding:16,color:C.green,textAlign:"center",fontWeight:700}}>🎉 No debtors! All students have paid.</div>}
    </div>
  </div>;
}

// ── FINANCIAL SUMMARY ─────────────────────────────────
function FinancialSummary({db,user}){
  if(!canAccessFees(user)) return <FeeAccessDenied/>;
  const [data,setData]=useState({income:0,expenses:0,fees:0,paid:0,banks:[]});const [loading,setLoading]=useState(true);
  useEffect(()=>{
    (async()=>{
      const [{data:trans},{data:students},{data:payments},{data:banks}]=await Promise.all([
        db.from("transactions").select("type,amount,category"),
        db.from("students").select("term_fee").eq("status","Active"),
        db.from("payments").select("amount"),
        db.from("bank_accounts").select("bank_name,balance"),
      ]);
      setData({
        income:(trans||[]).filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),
        expenses:(trans||[]).filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0),
        fees:(students||[]).reduce((s,r)=>s+Number(r.term_fee||0),0),
        paid:(payments||[]).reduce((s,p)=>s+p.amount,0),
        banks:banks||[],
      });
      setLoading(false);
    })();
  },[]);
  if(loading)return <div className="spinner"></div>;
  const net=data.income-data.expenses;
  const totalBank=data.banks.reduce((s,b)=>s+Number(b.balance||0),0);
  return <div>
    <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif",marginBottom:18}}>📊 Financial Summary</div>
    <div className="flex gap-10 mb-16 flex-wrap">
      {[{l:"Total Income",v:data.income,c:C.green,i:"📥"},{l:"Total Expenses",v:data.expenses,c:C.red,i:"📤"},{l:"Net Balance",v:net,c:net>=0?C.teal:C.red,i:"💼"},{l:"Fees Due",v:data.fees,c:C.accent,i:"📋"},{l:"Fees Collected",v:data.paid,c:C.green,i:"✅"},{l:"Outstanding Fees",v:data.fees-data.paid,c:C.red,i:"⚠️"},{l:"Total Bank Balance",v:totalBank,c:C.blue,i:"🏦"}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,minWidth:120}}>
          <div style={{fontSize:18,marginBottom:3}}>{x.i}</div>
          <div style={{fontSize:15,fontWeight:900,color:x.c}}>TZS {x.v.toLocaleString()}</div>
          <div style={{fontSize:15,color:C.textSoft,marginTop:2}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div className="card">
      <div style={{fontWeight:800,marginBottom:11,fontSize:15}}>🏦 Bank Accounts Balance</div>
      <table className="table">
        <thead><tr>{["Bank","Balance"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{data.banks.map((b,i)=><tr key={i}>
          <td style={{fontWeight:700}}>{b.bank_name}</td>
          <td style={{fontWeight:900,color:C.green}}>TZS {Number(b.balance||0).toLocaleString()}</td>
        </tr>)}</tbody>
      </table>
      {data.banks.length===0&&<div style={{padding:12,color:C.muted,textAlign:"center"}}>No bank accounts registered</div>}
    </div>
  </div>;
}

      <select className="input" style={{width:150}} value={fClass} onChange={e=>setFClass(e.target.value)}><option>All</option>{classes.map(c=><option key={c.id}>{c.name}</option>)}</select>
    </div>
    {loading?<div className="spinner"></div>:<div className="card">
      <table className="table">
        <thead><tr>{["Position","Name","Adm No","Class","Total","Average","Grade"].map(h=><th key={h}>{h}</th>)}</tr></thead>

          <td style={{fontWeight:700}}>{s.name}</td>

function PaymentFollowup({db,user}){
  if(!canAccessFees(user)) return <FeeAccessDenied/>;
  const {data:students}=useDB("students",{order:"name",eq:{status:"Active"}});
  const [payments,setPayments]=useState([]);
  useEffect(()=>{db.from("payments").select("*").then(({data})=>setPayments(data||[]));},[]);
  const paidFor=id=>payments.filter(p=>p.student_id===id).reduce((s,p)=>s+p.amount,0);
  const debtors=students.filter(s=>Number(s.term_fee||0)-paidFor(s.id)>0);
  const [sending,setSending]=useState(false);const [results,setResults]=useState([]);
  const [apiKey]=useState(()=>localStorage.getItem("nextsms_key")||"");
  const [sender]=useState(()=>localStorage.getItem("nextsms_sender")||"NAJMANshule");
  const sendReminders=async()=>{

    const targets=debtors.filter(s=>s.phone);
    if(!targets.length){alert("No debtors with phone numbers!");return;}
    setSending(true);const res=[];
    for(const s of targets){
      const bal=Number(s.term_fee||0)-paidFor(s.id);
      const msg=`Dear ${s.parent||s.name}, your child ${s.name} (${s.class_name}) has an outstanding fee balance of TZS ${bal.toLocaleString()}. Please pay promptly. Najman School +255 742 415 133`;
      try{const r=await sendSMS(s.phone,msg);
        res.push({name:s.name,ok:r.ok});
        await db.from("sms_log").insert({recipient_name:s.name,phone:s.phone,message:msg,status:r.ok?"sent":"failed"});
      }catch{res.push({name:s.name,ok:false});}
    }
    setResults(res);setSending(false);
  };
  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>📲 Payment Follow-up</div>

    <div className="card" style={{marginBottom:14,background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.3)"}}>
      <div style={{fontSize:15,color:C.textSoft}}>This will send SMS fee reminders to all parents of students with outstanding balances. Total: <strong style={{color:C.accent}}>{debtors.filter(s=>s.phone).length} parents</strong> will receive SMS.</div>
    </div>
    {results.length>0&&<div className="card mb-14">
      {results.map((r,i)=><div key={i} className="flex align-center gap-10" style={{padding:"6px 0",borderBottom:"1px solid #1f2e47"}}>
        <span>{r.ok?"✅":"❌"}</span><div className="fw-700">{r.name}</div>{badge(r.ok?C.green:C.red,r.ok?"Sent":"Failed")}
      </div>)}
    </div>}
    <div className="card">
      <div style={{fontWeight:800,marginBottom:11}}>Students with Outstanding Balance</div>
      <table className="table">
        <thead><tr>{["Name","Class","Parent","Phone","Balance"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{debtors.map(s=><tr key={s.id}>
          <td style={{fontWeight:700}}>
            {(s.name||"").split(" ").map((n,i)=><div key={i} style={{lineHeight:1.6,fontSize:i===0?13:12,color:i===0?"#e8edf5":"#94a3b8"}}>{n}</div>)}
          </td>
          <td>{badge(C.blue,s.class_name)}</td>
          <td>{s.parent||"—"}</td>
          <td style={{color:s.phone?C.text:C.red}}>{s.phone||"❌ No phone"}</td>
          <td style={{fontWeight:900,color:C.red}}>TZS {(Number(s.term_fee||0)-paidFor(s.id)).toLocaleString()}</td>
        </tr>)}</tbody>
      </table>
      {debtors.length===0&&<div style={{padding:16,color:C.green,textAlign:"center",fontWeight:700}}>🎉 All students paid!</div>}
    </div>
  </div>;
}

    </div>
  </div>;
}

function StudentDiary({db,user}){
  const {data:students}=useDB("students",{order:"name",eq:{status:"Active"}});
  const {data:classes}=useDB("classes",{order:"name"});
  const [entries,setEntries]=useState([]);const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);const [fClass,setFClass]=useState("All");
  const [form,setForm]=useState({student_id:"",entry_date:fmtDate(),title:"",content:"",type:"Note",created_by:user.id});
  const load=async()=>{setLoading(true);const{data}=await db.from("student_diary").select("*,students(name,class_name)").order("entry_date",{ascending:false});setEntries(data||[]);setLoading(false);};
  useEffect(()=>{load();},[]);
  const save=async()=>{if(!form.student_id||!form.content.trim())return;await db.from("student_diary").insert(form);load();setModal(false);setForm({student_id:"",entry_date:fmtDate(),title:"",content:"",type:"Note",created_by:user.id});};
  const del=async(id)=>{if(!confirm("Delete?"))return;await db.from("student_diary").delete().eq("id",id);load();};
  const TYPE_C={"Note":C.blue,"Behavior":C.accent,"Achievement":C.green,"Concern":C.red,"Health":"#a855f7"};
  const filtered=entries.filter(e=>fClass==="All"||e.students?.class_name===fClass);
  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">

      </div>

        <div className="flex justify-between align-center mb-8">
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{e.students?.name||"—"} <span style={{color:C.muted,fontWeight:400,fontSize:15}}>({e.students?.class_name})</span></div>
            <div style={{fontSize:15,color:C.muted}}>{e.entry_date}</div>
          </div>
          <div className="flex gap-6 align-center">
            <span style={{background:`${TYPE_C[e.type]||C.blue}22`,color:TYPE_C[e.type]||C.blue,borderRadius:20,padding:"2px 8px",fontSize:15,fontWeight:700}}>{e.type}</span>
            <button className="btn btn-red" style={{padding:"2px 7px",fontSize:15}} onClick={()=>del(e.id)}>🗑️</button>
          </div>
        </div>
        {e.title&&<div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{e.title}</div>}
        <div style={{fontSize:15,color:C.textSoft,lineHeight:1.7}}>{e.content}</div>
      </div>)}
      {filtered.length===0&&<div className="card" style={{textAlign:"center",padding:36,color:C.muted}}>No diary entries yet</div>}
    </div>}
    {modal&&<div className="overlay"><div className="modal">
      <div style={{fontWeight:900,fontSize:16,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>📓 New Diary Entry</div>
      <div className="mb-10"><label className="label">Student *</label><select className="input" value={form.student_id} onChange={e=>setForm(f=>({...f,student_id:e.target.value}))}><option value="">-- Select --</option>{students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.class_name})</option>)}</select></div>
      <div className="grid-2">

    </div></div>}

// ── HOMEWORK ──────────────────────────────────────────
function Homework({db,user}){
  const {data:classes}=useDB("classes",{order:"name"});
  const {data:subjects}=useDB("subjects",{order:"name"});
  const [hw,setHw]=useState([]);const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);const [fClass,setFClass]=useState("All");
  const [hwSearch,setHwSearch]=useState("");
  const [form,setForm]=useState({class_name:"",subject_id:"",title:"",description:"",due_date:"",assigned_date:fmtDate(),created_by:user.id});
  const load=async()=>{setLoading(true);const{data}=await db.from("homework").select("*,subjects(name)").order("due_date",{ascending:true});setHw(data||[]);setLoading(false);};
  useEffect(()=>{load();},[]);
  const save=async()=>{
    if(!form.title.trim()||!form.class_name)return;
    await db.from("homework").insert(form);

    // ── AUTO: SMS homework notification to parents of class ──

    if(form.due_date){
      const{data:classStudents}=await db.from("students").select("name,parent,phone").eq("class_name",form.class_name).eq("status","Active");
      let sent=0;
      for(const st of(classStudents||[]).filter(s=>s.phone)){
        const msg=`Dear ${st.parent||"Parent"}, ${st.name}'s class has been assigned homework: "${form.title}". Due date: ${form.due_date}. Najman School`;
        try{const rh=await sendSMS(st.phone,msg);if(rh.ok)sent++;}catch{}
      }
      if(sent>0)alert(`✅ Homework assigned! 📲 ${sent} SMS sent to parents of ${form.class_name}`);
    }

    load();setModal(false);setForm({class_name:"",subject_id:"",title:"",description:"",due_date:"",assigned_date:fmtDate(),created_by:user.id});
  };
  const del=async(id)=>{if(!confirm("Delete?"))return;await db.from("homework").delete().eq("id",id);load();};
  const isOverdue=hw=>hw.due_date&&hw.due_date<fmtDate();
  const filtered=hw.filter(h=>(fClass==="All"||h.class_name===fClass)&&(h.title.toLowerCase().includes(hwSearch.toLowerCase())||h.class_name?.toLowerCase().includes(hwSearch.toLowerCase())));
  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>📚 Homework</div>
      <div className="flex gap-8 flex-wrap">
        <input className="input" style={{width:150}} placeholder="🔍 Search..." value={hwSearch} onChange={e=>setHwSearch(e.target.value)}/>
        <select className="input" style={{width:140}} value={fClass} onChange={e=>setFClass(e.target.value)}><option>All</option>{classes.map(c=><option key={c.id}>{c.name}</option>)}</select>
        <button className="btn-ghost" style={{fontSize:13,padding:"8px 14px"}} onClick={()=>exportPDF(
          "Homework List",
          ["#","Kichwa","Class","Subject","Date","Due Date","Status"],
          filtered.map((h,i)=>[i+1,h.title,h.class_name||"—",h.subjects?.name||"General",h.assigned_date||"—",h.due_date||"—",h.due_date<fmtDate()?"Overdue":"Active"]),
          "homework"
        )}>📄 PDF</button>
        <button className="btn" onClick={()=>setModal(true)}>+ Homework</button>
      </div>
    </div>
    {loading?<div className="spinner"></div>:<div>
      {filtered.map(h=><div key={h.id} className="card" style={{borderLeft:`4px solid ${isOverdue(h)?C.red:h.due_date===fmtDate()?C.accent:C.green}`,marginBottom:10}}>
        <div className="flex justify-between align-center mb-6">
          <div>
            <div style={{fontWeight:800,fontSize:15}}>{h.title}</div>
            <div style={{fontSize:15,color:C.muted}}>{h.class_name} • {h.subjects?.name||"General"}</div>
          </div>
          <div className="flex gap-6 align-center">

function LearningMaterials({db,user}){
  const {data:classes}=useDB("classes",{order:"name"});
  const {data:subjects}=useDB("subjects",{order:"name"});
  const [materials,setMaterials]=useState([]);const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);const [fClass,setFClass]=useState("All");
  const [form,setForm]=useState({class_name:"",subject_id:"",title:"",description:"",material_type:"Document",url:"",created_by:user.id});
  const [uploading,setUploading]=useState(false);
  const [uploadErr,setUploadErr]=useState("");
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const load=async()=>{setLoading(true);const{data}=await db.from("learning_materials").select("*,subjects(name)").order("created_at",{ascending:false});setMaterials(data||[]);setLoading(false);};
  useEffect(()=>{load();},[]);
  const uploadFile=async(file)=>{
    if(!file)return;
    setUploading(true);setUploadErr("");
    try{
      const ext=file.name.split(".").pop();
      const safeName=`${Date.now()}_${Math.floor(Math.random()*10000)}.${ext}`;
      const {error:upErr}=await db.storage.from("learning-materials").upload(safeName,file,{cacheControl:"3600",upsert:false});
      if(upErr) throw upErr;
      const {data:pub}=db.storage.from("learning-materials").getPublicUrl(safeName);
      F("url",pub.publicUrl);
      if(!form.title.trim()) F("title",file.name.replace(/\.[^/.]+$/,""));
    }catch(err){
      setUploadErr("Upload failed: "+(err.message||"Check your connection or the bucket 'learning-materials' in Supabase Storage"));
    }
    setUploading(false);
  };
  const save=async()=>{if(!form.title.trim())return;await db.from("learning_materials").insert(form);load();setModal(false);setForm({class_name:"",subject_id:"",title:"",description:"",material_type:"Document",url:"",created_by:user.id});setUploadErr("");};
  const del=async(id)=>{if(!confirm("Delete?"))return;await db.from("learning_materials").delete().eq("id",id);load();};
  const TYPE_I={"Document":"📄","Video":"🎥","Audio":"🎵","Image":"🖼️","Link":"🔗","Book":"📚"};

  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>📖 Learning Materials</div>
      <div className="flex gap-8">

        <button className="btn" onClick={()=>setModal(true)}>+ Add Material</button>
      </div>
    </div>
    {loading?<div className="spinner"></div>:<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
      {filtered.map(m=><div key={m.id} className="card" style={{marginBottom:0}}>
        <div style={{fontSize:28,marginBottom:8}}>{TYPE_I[m.material_type]||"📄"}</div>
        <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>{m.title}</div>
        <div style={{fontSize:15,color:C.muted,marginBottom:6}}>{m.class_name} • {m.subjects?.name||"General"}</div>
        {m.description&&<div style={{fontSize:15,color:C.textSoft,marginBottom:8,lineHeight:1.6}}>{m.description}</div>}
        <div className="flex gap-6">
          {m.url&&<a href={m.url} target="_blank" className="btn btn-blue" style={{padding:"4px 9px",fontSize:15,textDecoration:"none"}}>🔗 Open</a>}
          <button className="btn btn-red" style={{padding:"4px 9px",fontSize:15}} onClick={()=>del(m.id)}>🗑️</button>
        </div>
      </div>)}
      {filtered.length===0&&<div className="card" style={{textAlign:"center",padding:36,color:C.muted,gridColumn:"1/-1"}}>No learning materials yet</div>}
    </div>}
    {modal&&<div className="overlay"><div className="modal">
      <div style={{fontWeight:900,fontSize:16,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>📖 Add Learning Material</div>
      <div className="grid-2">
        <div><label className="label">Class</label><select className="input" value={form.class_name} onChange={e=>setForm(f=>({...f,class_name:e.target.value}))}><option value="">All Classes</option>{classes.map(c=><option key={c.id}>{c.name}</option>)}</select></div>
        <div><label className="label">Subject</label><select className="input" value={form.subject_id} onChange={e=>setForm(f=>({...f,subject_id:e.target.value}))}><option value="">-- Select --</option>{subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
        <div><label className="label">Type</label><select className="input" value={form.material_type} onChange={e=>setForm(f=>({...f,material_type:e.target.value}))}>{Object.keys(TYPE_I).map(t=><option key={t}>{t}</option>)}</select></div>
        <div className="grid-full"><label className="label">Title *</label><input className="input" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/></div>
        <div className="grid-full">
          <label className="label">Upload File from Device (PDF, Word, Image, etc.)</label>
          <label style={{cursor:"pointer",display:"block"}}>
            <span className="btn-ghost" style={{fontSize:13,padding:"9px 14px",display:"block",textAlign:"center"}}>{uploading?"⏳ Uploading...":"📁 Choose File"}</span>

      <div className="flex gap-8 justify-between" style={{marginTop:14}}><button className="btn-ghost" onClick={()=>setModal(false)}>Cancel</button><button className="btn" disabled={uploading} onClick={save}>{uploading?"Subiri...":"Save"}</button></div>
    </div></div>}

}

function Dashboard({db,user,setPage}){
  const [stats,setStats]=useState({students:0,staff:0,fees:0,paid:0,pending:0,present:0,absent:0,debtors:0,income:0,expenses:0,smsSent:0,smsFailed:0,boys:0,girls:0,classes:0});
  const [monthlyData,setMonthlyData]=useState([]);
  const [classData,setClassData]=useState([]);
  const [recentPayments,setRecentPayments]=useState([]);
  const [recentAdmissions,setRecentAdmissions]=useState([]);
  const [upcomingExams,setUpcomingExams]=useState([]);
  const [loading,setLoading]=useState(true);
  const [clock,setClock]=useState(new Date());
  const MONTHS_S=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // Live clock - updates every second
  useEffect(()=>{
    const t=setInterval(()=>setClock(new Date()),1000);
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{(async()=>{
    const today=fmtDate();
    const yr=new Date().getFullYear();
    const [{count:students},{count:staff},{data:feeRows},{data:payments},{count:pending},{count:present},{count:absent},{data:classes},{data:trans},{data:smsLogs},{data:admissionsRecent},{data:exams},{data:genderRows}]=await Promise.all([
      db.from("students").select("*",{count:"exact",head:true}).eq("status","Active"),
      db.from("staff").select("*",{count:"exact",head:true}).eq("status","Active"),
      db.from("students").select("term_fee,class_name").eq("status","Active"),
      db.from("payments").select("amount,payment_date,method,students(name,class_name)").order("payment_date",{ascending:false}),
      db.from("admissions").select("*",{count:"exact",head:true}).eq("status","Pending"),
      db.from("attendance").select("*",{count:"exact",head:true}).eq("att_date",today).eq("status","P"),
      db.from("attendance").select("*",{count:"exact",head:true}).eq("att_date",today).eq("status","A"),
      db.from("classes").select("name"),
      db.from("transactions").select("type,amount,created_at"),
      db.from("sms_log").select("status").order("created_at",{ascending:false}).limit(500),
      db.from("admissions").select("full_name,apply_class,app_date").order("created_at",{ascending:false}).limit(5),
      db.from("examinations").select("name,class_name,exam_date").gte("exam_date",today).order("exam_date",{ascending:true}).limit(4),
      db.from("students").select("gender").eq("status","Active"),
    ]);
    const totalFees=(feeRows||[]).reduce((s,r)=>s+Number(r.term_fee||0),0);
    const totalPaid=(payments||[]).reduce((s,p)=>s+p.amount,0);
    const debtors=(feeRows||[]).filter(r=>Number(r.term_fee||0)>0).length;
    const income=(trans||[]).filter(t=>t.type==="income").reduce((s,t)=>s+Number(t.amount||0),0);
    const expenses=(trans||[]).filter(t=>t.type==="expense").reduce((s,t)=>s+Number(t.amount||0),0);
    const smsSent=(smsLogs||[]).filter(l=>l.status==="sent").length;
    const smsFailed=(smsLogs||[]).filter(l=>l.status==="failed").length;
    const boys=(genderRows||[]).filter(g=>g.gender==="Male").length;
    const girls=(genderRows||[]).filter(g=>g.gender==="Female").length;

    // Monthly payment data
    const monthly=MONTHS_S.map((m,i)=>{
      const mPay=(payments||[]).filter(p=>new Date(p.payment_date).getMonth()===i&&new Date(p.payment_date).getFullYear()===yr);
      return{month:m,amount:mPay.reduce((s,p)=>s+p.amount,0)};
    });

    // Class breakdown
    const classMap={};
    (feeRows||[]).forEach(r=>{if(!classMap[r.class_name])classMap[r.class_name]=0;classMap[r.class_name]++;});
    const classArr=Object.entries(classMap).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count).slice(0,10);

    setStats({students:students||0,staff:staff||0,fees:totalFees,paid:totalPaid,pending:pending||0,present:present||0,absent:absent||0,debtors,income,expenses,smsSent,smsFailed,boys,girls,classes:(classes||[]).length});
    setMonthlyData(monthly);
    setClassData(classArr);
    setRecentPayments((payments||[]).slice(0,5));
    setRecentAdmissions(admissionsRecent||[]);
    setUpcomingExams(exams||[]);
    setLoading(false);
  })();},[]);

  if(loading)return<Spinner/>;

  const collectionPct=stats.fees>0?Math.min(100,Math.round(stats.paid/stats.fees*100)):0;
  const maxMonthly=Math.max(...monthlyData.map(m=>m.amount),1);
  const maxClass=Math.max(...classData.map(c=>c.count),1);
  const role=user?.profile?.role||"admin";
  const attTotal=stats.present+stats.absent;
  const attPct=attTotal>0?Math.round(stats.present/attTotal*100):0;
  const smsTotal=stats.smsSent+stats.smsFailed;
  const genderTotal=stats.boys+stats.girls;
  const net=stats.income-stats.expenses;

  const AG={navy:"#0f1b3d",card:"#151f38",cardBorder:"#232f4d",gold:"#d4a441",goldSoft:"#e8c877",teal:"#2dd4bf",green:"#4ade80",coral:"#f2725a",violet:"#8b7fd6",blue:"#60a5fa",dim:"#8a93ab",mid:"#c3cbe0"};

  const Ring=({pct,color,size=88,track="#232f4d"})=>{
    const r=(size-12)/2, circ=2*Math.PI*r, off=circ-(Math.min(100,Math.max(0,pct))/100)*circ;
    return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth="8"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="8" strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"/>
    </svg>;
  };

  const StatCard=({label,value,icon,bg,color,page,roles})=>{
    if(roles&&!roles.includes(role))return null;

// ── V4.0: NOTIFICATIONS PAGE ──────────────────────────
function Notifications({db,user,setPage}){
  const [notifs,setNotifs]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{(async()=>{
    const today=fmtDate();
    const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
    const tomorrowStr=tomorrow.toISOString().slice(0,10);
    const results=[];

    // Check pending admissions
    const {count:pending}=await db.from("admissions").select("*",{count:"exact",head:true}).eq("status","Pending");
    if(pending>0)results.push({type:"urgent",icon:"📝",title:`${pending} Admission Requests`,desc:"Requests awaiting review",action:"admissions",time:"Today"});

    // Check debtors
    const {data:students}=await db.from("students").select("id,name,term_fee,class_name").eq("status","Active");
    const {data:payments}=await db.from("payments").select("student_id,amount");
    const paidMap={};(payments||[]).forEach(p=>{if(!paidMap[p.student_id])paidMap[p.student_id]=0;paidMap[p.student_id]+=p.amount;});
    const debtors=(students||[]).filter(s=>Number(s.term_fee||0)>0&&(paidMap[s.id]||0)<Number(s.term_fee||0));
    if(debtors.length>0)results.push({type:"urgent",icon:"⚠️",title:`Students ${debtors.length} have not paid fees`,desc:`Total debt: TZS ${debtors.reduce((s,st)=>s+Number(st.term_fee||0)-(paidMap[st.id]||0),0).toLocaleString()}`,action:"fee_debtors",time:"Today"});

    // Check today's attendance
    const {count:todayAtt}=await db.from("attendance").select("*",{count:"exact",head:true}).eq("att_date",today);
    const totalStudents=students?.length||0;
    if(todayAtt===0&&totalStudents>0)results.push({type:"info",icon:"📋",title:"Today's Attendance Not Set",desc:`Students ${totalStudents} not yet recorded`,action:"attendance",time:"Today"});

    // Check homework due today
    const {data:hwDue}=await db.from("homework").select("*").eq("due_date",today);
    if(hwDue?.length>0)results.push({type:"info",icon:"📚",title:`Tasks ${hwDue.length} homework due today`,desc:hwDue.map(h=>h.title).join(", ").slice(0,80),action:"homework",time:"Today"});

    // Check upcoming live classes
    const {data:liveClasses}=await db.from("live_classes").select("*").eq("scheduled_date",tomorrowStr);
    if(liveClasses?.length>0)results.push({type:"success",icon:"🎥",title:`Class ${liveClasses.length} online class tomorrow`,desc:liveClasses.map(c=>c.title).join(", "),action:"live_class",time:"Tomorrow"});

    // Welcome if no notifications
    if(results.length===0)results.push({type:"success",icon:"🎉",title:"Everything looks good!",desc:"No urgent notifications at the moment.",action:null,time:"Today"});

    setNotifs(results);
    setLoading(false);
  })();},[]);

  return<div>
    <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif",marginBottom:6}}>🔔 Notifications <span className="v4-badge">v7.0</span></div>
    <div style={{fontSize:13,color:C.muted,marginBottom:18}}>Important school updates</div>
    {loading?<Spinner/>:<div>
      {notifs.map((n,i)=><div key={i} className={`notif-item ${n.type}`} style={{cursor:n.action?"pointer":"default"}} onClick={()=>n.action&&setPage(n.action)}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
          <span style={{fontSize:22,flexShrink:0}}>{n.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:14,marginBottom:3}}>{n.title}</div>
            <div style={{fontSize:12,color:C.textSoft}}>{n.desc}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
              <span style={{fontSize:11,color:C.muted}}>{n.time}</span>
              {n.action&&<span style={{fontSize:11,color:C.accent,fontWeight:700}}>View →</span>}
            </div>
          </div>
        </div>
      </div>)}
    </div>}
  </div>;
}

// ── V4.0: SMS FEE REMINDERS ──────────────────────────
function SmsFeeReminders({db,user}){
  if(!canAccessFees(user)) return <FeeAccessDenied/>;
  const {data:students}=useDB("students",{order:"name",eq:{status:"Active"}});
  const [payments,setPayments]=useState([]);
  const [sending,setSending]=useState(false);
  const [results,setResults]=useState([]);
  const [cfg,setCfg]=useState({apiKey:"",sender:"NAJMANshule"});
  const [customMsg,setCustomMsg]=useState("");
  const [preview,setPreview]=useState(null);

  useEffect(()=>{
    db.from("payments").select("*").then(({data})=>setPayments(data||[]));
    const k=localStorage.getItem("nextsms_key")||"";
    const s=localStorage.getItem("nextsms_sender")||"NAJMANshule";
    setCfg({apiKey:k,sender:s});
  },[]);

  const paidFor=id=>payments.filter(p=>p.student_id===id).reduce((s,p)=>s+p.amount,0);
  const debtors=students.filter(s=>Number(s.term_fee||0)>0&&paidFor(s.id)<Number(s.term_fee||0)&&s.phone);

  const buildMsg=s=>{
    const bal=Number(s.term_fee||0)-paidFor(s.id);
    if(customMsg)return customMsg.replace("{name}",s.name).replace("{class}",s.class_name).replace("{balance}","TZS "+bal.toLocaleString());
    return `Ndugu ${s.parent||s.name}, mwanao ${s.name} (${s.class_name}) ana deni la fees for TZS ${bal.toLocaleString()}. Tafadhali lipia haraka. Najman School +255 742 415 133`;
  };

  const sendAll=async()=>{
    if(!cfg.apiKey){alert("Enter API Key in SMS Settings!");return;}
    if(!debtors.length){alert("No parents wenye simu!");return;}
    setSending(true);const res=[];
    for(const s of debtors){
      const msg=buildMsg(s);
      try{
        const r=await sendSMS(s.phone,msg);
        await db.from("sms_log").insert({recipient_name:s.name,phone:s.phone,message:msg,status:r.ok?"sent":"failed"});
        res.push({name:s.name,phone:s.phone,ok:r.ok});
      }catch{res.push({name:s.name,phone:s.phone,ok:false});}
    }
    setResults(res);setSending(false);
  };

  return<div>
    <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif",marginBottom:6}}>📲 Fee Reminders <span className="v4-badge">v7.0</span></div>
    <div style={{fontSize:13,color:C.muted,marginBottom:18}}>Send fee messages to all parents with outstanding balances</div>

    <div className="flex gap-12 flex-wrap">
      <div style={{flex:1,minWidth:260}}>
        <div className="card">
          <div style={{fontWeight:800,fontSize:14,marginBottom:10,color:C.accent}}>⚙️ Message Settings</div>
          <div className="mb-10"><label className="label">Custom Message (optional)</label>
            <textarea className="input" style={{height:80,resize:"vertical"}} value={customMsg} onChange={e=>setCustomMsg(e.target.value)} placeholder="Use {name}, {class}, {balance} for student details..."/></div>
          {customMsg&&<div style={{padding:10,background:"#f0f7ff",borderRadius:8,fontSize:12,marginBottom:10}}>
            <div style={{fontWeight:700,marginBottom:4}}>Example:</div>
            {debtors[0]?buildMsg(debtors[0]):"Select your template"}
          </div>}
          <div style={{padding:10,background:"rgba(245,166,35,.08)",borderRadius:8,fontSize:12,color:C.textSoft,marginBottom:14}}>
            Total recipients: <strong style={{color:C.accent}}>{debtors.length} parents</strong>
          </div>
          <button className="btn btn-green w-full" onClick={sendAll} disabled={sending||!debtors.length}>
            {sending?"⏳ Sending...":"📤 Send All Reminders"}
          </button>
        </div>
      </div>

      <div style={{flex:2,minWidth:260}}>
        {results.length>0&&<div className="card" style={{marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:14,marginBottom:8}}>📊 Send Results</div>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <div style={{background:`${C.green}11`,border:`1px solid ${C.green}33`,borderRadius:8,padding:"8px 12px",flex:1,textAlign:"center"}}>
              <div style={{fontWeight:900,color:C.green,fontSize:16}}>{results.filter(r=>r.ok).length}</div>
              <div style={{fontSize:11}}>Sent</div>
            </div>
            <div style={{background:`${C.red}11`,border:`1px solid ${C.red}33`,borderRadius:8,padding:"8px 12px",flex:1,textAlign:"center"}}>
              <div style={{fontWeight:900,color:C.red,fontSize:16}}>{results.filter(r=>!r.ok).length}</div>
              <div style={{fontSize:11}}>Failed</div>
            </div>
          </div>
          {results.map((r,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid #1f2e47",fontSize:12}}>
            <span>{r.ok?"✅":"❌"}</span><span style={{fontWeight:700}}>{r.name}</span><span style={{color:C.muted}}>{r.phone}</span>
          </div>)}
        </div>}
        <div className="card">
          <div style={{fontWeight:800,fontSize:14,marginBottom:8,color:C.red}}>📋 Debtors List ({debtors.length})</div>
          {debtors.map((s,i)=><div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1f2e47"}}>
            <div><div style={{fontWeight:700,fontSize:13}}>{s.name}</div><div style={{fontSize:11,color:C.muted}}>{s.class_name} • {s.phone}</div></div>
            <div style={{fontWeight:900,color:C.red,fontSize:13}}>TZS {(Number(s.term_fee||0)-paidFor(s.id)).toLocaleString()}</div>
          </div>)}
          {debtors.length===0&&<div style={{color:C.green,textAlign:"center",padding:16,fontWeight:700}}>🎉 Everyone has paid!</div>}
        </div>
      </div>
    </div>
  </div>;
}

      <button className="btn-ghost" style={{fontSize:13,padding:"8px 14px"}} onClick={()=>exportPDF("SMS Log",["Date","Recipient","Phone","Status","Message"],filtered.map(l=>[new Date(l.created_at).toLocaleDateString("en-GB"),l.recipient_name||"—",l.phone||"—",l.status||"—",(l.message||"").slice(0,50)]),"sms_log")}>📄 PDF</button>
    </div>

      <table className="table">
        <thead><tr>{["Date","Recipient","Phone","Status","Message","Reason"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{filtered.map(l=><tr key={l.id}>
          <td style={{fontSize:11,color:C.muted}}>{l.created_at?new Date(l.created_at).toLocaleDateString("en-GB"):"—"}</td>

          <td style={{fontSize:12}}>{l.phone||"—"}</td>
          <td>{badge(l.status==="sent"?C.green:C.red,l.status||"—")}</td>
          <td style={{fontSize:11,color:C.textSoft,maxWidth:200}}>{(l.message||"").slice(0,60)}{(l.message||"").length>60?"...":""}</td>
          <td style={{fontSize:11,color:l.status==="failed"?C.red:C.muted,maxWidth:220}}>{l.status==="failed"?(l.error_detail||"—"):"—"}</td>

      </table>
      {filtered.length===0&&<div style={{padding:16,color:C.muted,textAlign:"center"}}>No messages yet</div>}

function UserAccounts({db,user}){
  const role=user?.profile?.role||"admin";
  if(role==="teacher") return <div className="card" style={{textAlign:"center",padding:48}}><div style={{fontSize:48}}>🔒</div><div style={{fontWeight:900,fontSize:18,color:"#dc2626",marginTop:8}}>Access Denied</div><div style={{color:"#64748b",fontSize:14,marginTop:4}}>Only available to Admin.</div></div>;
  const [users,setUsers]=useState([]);const [loading,setLoading]=useState(true);

  const [form,setForm]=useState({full_name:"",email:"",role:"teacher",phone:""});
  const [creating,setCreating]=useState(false);const [msg,setMsg]=useState("");

  useEffect(()=>{db.from("user_profiles").select("*").order("full_name").then(({data})=>{setUsers(data||[]);setLoading(false);});},[]);

    if(!form.email||!form.full_name)return;
    setCreating(true);setMsg("");

      const{data,error}=await db.auth.admin?db.auth.admin.createUser({email:form.email,email_confirm:true,user_metadata:{full_name:form.full_name}}):null;

  const ROLE_COLORS={admin:C.accent,teacher:C.blue,accountant:C.green,parent:"#a855f7"};

  return<div>
