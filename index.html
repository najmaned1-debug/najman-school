<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Najman Education Centre — School Management v7.0</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1120;font-family:'Nunito',sans-serif;color:#e8edf5;min-height:100vh;font-weight:700;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#111827;}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#f5a623,#e8890a);border-radius:10px;}
input,select,textarea{font-family:'Nunito',sans-serif;font-weight:700;}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:200px;height:100vh;
  background:linear-gradient(180deg,#111827 0%,#0d1526 60%,#0a1020 100%);
  border-right:1px solid #1f2e47;display:flex;flex-direction:column;z-index:100;overflow-y:auto;
  box-shadow:4px 0 24px rgba(0,0,0,.35);}
.main{margin-left:200px;padding:22px 20px;min-height:100vh;background:#0b1120;}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:301;
  background:linear-gradient(135deg,#f5a623,#e8890a);
  border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:18px;color:#fff;
  box-shadow:0 4px 12px rgba(245,166,35,.4);}
@media(max-width:600px){
  .sidebar{transform:translateX(-100%);transition:.3s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0!important;padding:12px!important;}
  .hamburger{display:flex!important;}
}

/* NAV */
.nav-item{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;
  border-left:3px solid transparent;font-size:13px;font-weight:700;color:#94a3b8;
  transition:all .2s;border-radius:0 10px 10px 0;margin:1px 8px 1px 0;}
.nav-item:hover{background:rgba(245,166,35,.12);color:#fbbf24;border-left-color:rgba(245,166,35,.6);}
.nav-item.active{background:rgba(245,166,35,.16);border-left-color:#f5a623;color:#f5a623;font-weight:900;}
.nav-group{padding:14px 16px 4px;font-size:9px;color:#4a7fa5;font-weight:900;letter-spacing:3px;text-transform:uppercase;}

/* CARDS */
.card{background:#1a2236;border:1px solid #1f2e47;border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.stat-card{background:#1a2236;border:1px solid #1f2e47;border-radius:16px;padding:20px;flex:1;box-shadow:0 2px 10px rgba(0,0,0,.2);transition:transform .2s,box-shadow .2s;}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.35);}

/* BUTTONS */
.btn{background:linear-gradient(135deg,#f5a623,#e8890a);color:#fff;border:none;border-radius:10px;
  padding:10px 20px;font-weight:900;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;
  box-shadow:0 4px 12px rgba(245,166,35,.35);transition:all .2s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(245,166,35,.45);}
.btn:active{transform:translateY(0);}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.25);}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 12px rgba(34,197,94,.25);}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.25);}
.btn-ghost{background:#151d30;color:#cbd5e1;
  border:1.5px solid #1f2e47;border-radius:10px;
  padding:9px 18px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;
  transition:all .2s;}
.btn-ghost:hover{border-color:#f5a623;color:#fbbf24;background:#1f1708;}

/* INPUTS */
.input{background:#0d1526;border:1.5px solid #263449;border-radius:10px;padding:10px 14px;color:#e8edf5;font-size:14px;font-weight:700;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;}
.input:focus{border-color:#f5a623;box-shadow:0 0 0 3px rgba(245,166,35,.15);}
select.input option{background:#0d1526;color:#e8edf5;font-weight:700;}
.label{font-size:11px;color:#94a3b8;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:block;}

/* TABLE */
.table{width:100%;border-collapse:collapse;font-size:14px;}
.table th{text-align:left;padding:12px 14px;background:#111827;color:#94a3b8;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;border-bottom:2px solid #1f2e47;}
.table td{padding:12px 14px;border-bottom:1px solid #1f2e47;color:#e8edf5;font-weight:700;vertical-align:middle;}
.table tr:hover td{background:#1f1708;}
.table thead tr th:first-child{border-radius:10px 0 0 0;}
.table thead tr th:last-child{border-radius:0 10px 0 0;}

/* BADGE */
.badge{border-radius:20px;padding:4px 11px;font-size:11px;font-weight:800;display:inline-block;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(6px);}
.modal{background:#1a2236;border:1px solid #1f2e47;border-radius:20px;padding:28px;width:490px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.4);}

/* TABS */
.tab-btn{background:#151d30;color:#cbd5e1;
  border:1.5px solid #1f2e47;border-radius:10px;
  padding:8px 16px;font-weight:800;font-size:13px;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:all .2s;}
.tab-btn:hover{border-color:rgba(245,166,35,.5);color:#fbbf24;background:#1f1708;}
.tab-btn.active{background:linear-gradient(135deg,#f5a623,#e8890a);color:#fff;border-color:#f5a623;font-weight:900;}

/* SPINNER */
.spinner{display:flex;justify-content:center;padding:40px;}
.spinner::after{content:'';width:38px;height:38px;
  border:3px solid rgba(245,166,35,.2);border-top-color:#f5a623;
  border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* V4.0 NEW STYLES */
.chart-bar{transition:height .4s ease,background .2s;}
.chart-bar:hover{filter:brightness(1.15);}
.notif-item{border-left:3px solid #f5a623;padding:10px 14px;margin-bottom:8px;background:#1a2236;border-radius:0 10px 10px 0;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.notif-item.urgent{border-left-color:#dc2626;background:#2a1414;}
.notif-item.info{border-left-color:#2563eb;background:#101f33;}
.notif-item.success{border-left-color:#16a34a;background:#0f2318;}
.quick-action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.quick-action-btn{background:#1a2236;border:1.5px solid #1f2e47;border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;}
.quick-action-btn:hover{border-color:#f5a623;background:#1f1708;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,166,35,.25);}
.v4-badge{background:linear-gradient(135deg,#f5a623,#e8890a);color:#fff;font-size:9px;font-weight:900;padding:2px 6px;border-radius:10px;letter-spacing:1px;margin-left:4px;vertical-align:middle;}
.sms-tab-content{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{text-align:center;padding:6px 2px;border-radius:6px;font-size:12px;font-weight:700;cursor:default;}
.cal-day.today{background:linear-gradient(135deg,#f5a623,#e8890a);color:#fff;}
.cal-day.has-event{background:rgba(245,166,35,.18);color:#fbbf24;}
.cal-day.other-month{color:#3b4a63;}

/* ALERTS */
.error-box{background:#2a1414;border:1px solid #7f1d1d;
  border-radius:10px;padding:12px 15px;font-size:14px;font-weight:700;color:#fca5a5;margin-bottom:14px;}
.success-box{background:#0f2318;border:1px solid #166534;
  border-radius:10px;padding:12px 15px;font-size:14px;font-weight:700;color:#86efac;margin-bottom:14px;}

/* GRID & FLEX UTILS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-full{grid-column:1/-1;}
.flex{display:flex;}.flex-wrap{flex-wrap:wrap;}
.gap-8{gap:8px;}.gap-10{gap:10px;}.gap-12{gap:12px;}.gap-14{gap:14px;}.gap-16{gap:16px;}
.mb-8{margin-bottom:8px;}.mb-10{margin-bottom:10px;}.mb-12{margin-bottom:12px;}
.mb-14{margin-bottom:14px;}.mb-16{margin-bottom:16px;}
.fw-700{font-weight:700;}.fw-900{font-weight:900;}
.fs-10{font-size:11px;}.fs-11{font-size:12px;}.fs-12{font-size:13px;}.fs-13{font-size:14px;}
.text-muted{color:#94a3b8;font-weight:700;}.text-soft{color:#cbd5e1;font-weight:700;}
.text-accent{color:#f5a623;}.text-green{color:#4ade80;}.text-red{color:#f87171;}
.justify-between{justify-content:space-between;}.align-center{align-items:center;}
.w-full{width:100%;}.text-center{text-align:center;}
</style>

// Generates the school stamp SVG with the payment date filled in on the DATE line (instead of blank dots)
function stampWithDate(dateStr){
  const d = dateStr ? new Date(dateStr) : new Date();
  const formatted = isNaN(d.getTime()) ? (dateStr||"") : d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="320" height="140" viewBox="0 0 320 140">
  <rect x="4" y="4" width="312" height="132" rx="4" fill="none" stroke="#1a4a9f" stroke-width="3"/>
  <rect x="10" y="10" width="300" height="120" rx="2" fill="none" stroke="#1a4a9f" stroke-width="1.5"/>
  <text x="160" y="38" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#1a4a9f" letter-spacing="4">PRINCIPAL</text>
  <line x1="20" y1="46" x2="300" y2="46" stroke="#1a4a9f" stroke-width="1"/>
  <text x="160" y="68" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#1a4a9f" letter-spacing="2">NAJMAN EDUCATION CENTRE</text>
  <text x="160" y="90" text-anchor="middle" font-family="Arial" font-weight="700" font-size="14" fill="#1a4a9f" letter-spacing="1">P. O. BOX 1333 - MWANZA</text>
  <text x="30" y="118" font-family="Arial" font-weight="700" font-size="13" fill="#1a4a9f">DATE: ${formatted}</text>
</svg>`;
  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
}

// ── PDF HELPER ─────────────────────────────────────────
const exportPDF = (title, columns, rows, filename) => {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation: rows.length>8&&columns.length>6?"landscape":"portrait"});
  const pageW = doc.internal.pageSize.getWidth();
  // Header background
  doc.setFillColor(30,58,95);
  doc.rect(0,0,pageW,28,"F");
  // School name
  doc.setTextColor(245,166,35);
  doc.setFontSize(13);doc.setFont("helvetica","bold");
  doc.text("NAJMAN EDUCATION CENTRE",pageW/2,10,{align:"center"});
  doc.setTextColor(255,255,255);
  doc.setFontSize(8);doc.setFont("helvetica","normal");
  doc.text("Kishili, Mwanza, Tanzania • +255 742 415 133",pageW/2,16,{align:"center"});
  // Title
  doc.setFontSize(11);doc.setFont("helvetica","bold");
  doc.text(title.toUpperCase(),pageW/2,23,{align:"center"});
  // Date
  doc.setTextColor(100,116,139);doc.setFontSize(8);doc.setFont("helvetica","normal");
  doc.text(`Generated: ${new Date().toLocaleDateString("en-GB")}`,pageW-10,23,{align:"right"});
  // Table
  doc.autoTable({
    head:[columns],body:rows,startY:32,
    headStyles:{fillColor:[30,58,95],textColor:[245,166,35],fontStyle:"bold",fontSize:9},
    bodyStyles:{fontSize:9,textColor:[30,41,59]},
    alternateRowStyles:{fillColor:[248,250,252]},
    margin:{left:10,right:10},
    didDrawPage:(d)=>{
      const pg=doc.internal.getNumberOfPages();
      doc.setFontSize(7);doc.setTextColor(148,163,184);
      doc.text(`Page ${d.pageNumber} of ${pg} • Najman Education Centre`,pageW/2,doc.internal.pageSize.getHeight()-5,{align:"center"});
    }
  });
  doc.save(`${filename}_${fmtDate()}.pdf`);
};

function canAccessFees(user){
  const role=user?.profile?.role||"admin";
  return role==="admin"||role==="accountant";
}

  return<div className="card" style={{textAlign:"center",padding:48}}>

    <div style={{fontWeight:900,fontSize:18,marginBottom:8,color:"#dc2626"}}>Access Denied</div>
    <div style={{color:"#64748b",fontSize:14}}>This page is only available to Accountant and Admin.<br/>Please contact your system administrator.</div>

}

function Field({label, value, onChange, type="text", placeholder=""}) {
  return <div className="mb-12">
    <label className="label">{label}</label>
    <input className="input" type={type} value={value||""} placeholder={placeholder} onChange={e=>onChange(e.target.value)}/>
  </div>;
}

function Select({label, value, onChange, options=[]}) {
  return <div className="mb-12">
    <label className="label">{label}</label>
    <select className="input" value={value||""} onChange={e=>onChange(e.target.value)}>
      {options.map(o => typeof o==="string" ? <option key={o}>{o}</option> : <option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  </div>;
}

// ── useDB hook ─────────────────────────────────────────
function useDB(table, opts={}) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const fetch = useCallback(async() => {
    setLoading(true);
    let q = db.from(table).select(opts.select||"*");
    if(opts.order) q = q.order(opts.order, {ascending: opts.asc!==false});
    if(opts.eq) Object.entries(opts.eq).forEach(([k,v]) => { q = q.eq(k,v); });
    const {data:d} = await q;
    setData(d||[]);
    setLoading(false);
  }, [table]);
  useEffect(() => { fetch(); }, [fetch]);
  return {data, loading, refresh: fetch};
}

  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const login = async() => {
    if(!email||!pass){setErr("Please enter email and password");return;}
    setLoading(true);setErr("");
    try {
      const {data,error} = await db.auth.signInWithPassword({email, password:pass});
      if(error) throw error;
      const {data:profile} = await db.from("user_profiles").select("*").eq("id",data.user.id).single();
      onLogin({...data.user, profile});

    setLoading(false);

// ── SIDEBAR ────────────────────────────────────────────
function Sidebar({page, setPage, user, onLogout, open}) {
  const role = user?.profile?.role||"admin";
  const [expanded, setExpanded] = useState({});

  const toggle = (id) => setExpanded(e=>({...e,[id]:!e[id]}));

  const navItems = NAV.filter(n=>n.roles.includes(role));

  const closeSidebar = () => { if(window.innerWidth<=600) document.getElementById("menuBtn").click(); };
  const goTo = (id) => { setPage(id); closeSidebar(); };

  return <div className={`sidebar ${open?"open":""}`}>
    <div style={{padding:"46px 12px 10px",borderBottom:"1px solid rgba(255,255,255,.1)",textAlign:"center"}}>
      <img src={SCHOOL_LOGO} style={{width:78,height:78,objectFit:"contain",display:"block",margin:"0 auto 8px",filter:"drop-shadow(0 2px 8px rgba(0,0,0,.35))"}}/>
      <div style={{fontSize:17,fontWeight:900,color:C.accent,fontFamily:"'Playfair Display',serif",letterSpacing:1,lineHeight:1.2}}>NAJMAN</div>
      <div style={{fontSize:10,color:"#94b8d8",letterSpacing:2,fontWeight:800,marginBottom:2}}>EDUCATION CENTRE</div>
      <div style={{fontSize:9,color:"rgba(148,184,216,.6)",letterSpacing:1,marginBottom:8}}>Kishili, Mwanza</div>
      <div style={{padding:"6px 10px",background:"rgba(245,166,35,.12)",borderRadius:8,border:"1px solid rgba(245,166,35,.2)"}}>
        <div style={{fontSize:12,fontWeight:900,color:C.accent,wordBreak:"break-word"}}>
          {getUserName(user)}
        </div>
        <div style={{fontSize:10,color:"#7aa8cc",textTransform:"capitalize",fontWeight:700,marginTop:2}}>{role}</div>
      </div>
    </div>
    <nav style={{flex:1,paddingBottom:12,overflowY:"auto"}}>
      {navItems.map((n,idx) => {
        const hasSub = n.sub && n.sub.length > 0;
        const isExp = expanded[n.id];
        const isActive = page===n.id || (hasSub && n.sub.some(s=>s.id===page));
        return <div key={n.id}>
          <div
            className={`nav-item ${isActive?"active":""}`}
            style={{justifyContent:"space-between"}}
            onClick={()=>{ if(hasSub){ toggle(n.id); }else{ goTo(n.id); } }}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>{n.icon}</span>
              <span style={{fontSize:12}}>{n.label}</span>
            </div>
            {hasSub&&<span style={{fontSize:10,color:isActive?C.accent:"#4a7fa5"}}>{isExp?"▼":"▶"}</span>}
          </div>
          {hasSub && isExp && <div style={{background:"rgba(59,130,246,.06)",borderLeft:"2px solid rgba(59,130,246,.4)",marginLeft:14}}>
            {n.sub.map(s=><div key={s.id}
              className={`nav-item ${page===s.id?"active":""}`}
              style={{padding:"6px 12px",fontSize:11,background:page===s.id?"rgba(59,130,246,.15)":"transparent"}}
              onClick={()=>goTo(s.id)}>
              <span style={{color:page===s.id?"#60a5fa":"#3b82f6",fontWeight:page===s.id?800:600,fontSize:11}}>▸ {s.label}</span>
            </div>)}
          </div>}
        </div>;
      })}
    </nav>
    <div style={{padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,.1)"}}>
      <div style={{fontSize:11,color:"#7aa8cc",marginBottom:6,fontWeight:800}}>v7.0 Pro • Supabase Cloud</div>
      <button className="btn btn-red w-full" style={{fontSize:15}} onClick={onLogout}>🚪 Sign Out</button>
    </div>
  </div>;
}

// ── APP ────────────────────────────────────────────────

// ── TEACHER PORTAL ─────────────────────────────────────
function TeacherPortal({db,user,setPage}){
  const [tab,setTab]=React.useState("students");
  const name=user?.profile?.full_name||user?.email||"Teacher";
  return <div>
    <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif",marginBottom:16}}>
      👩‍🏫 Teacher Portal — {name}
    </div>
    <div style={{marginBottom:16}}><LiveClassActivity db={db}/></div>
    <div className="flex gap-8 mb-16">
      <button className={`btn ${tab==="students"?"btn-orange":""}`} onClick={()=>setTab("students")}>📝 Register Student</button>
      <button className={`btn ${tab==="fees"?"btn-orange":""}`} onClick={()=>setTab("fees")}>💰 Collect Fees</button>
      <button className={`btn ${tab==="attendance"?"btn-orange":""}`} onClick={()=>setTab("attendance")}>✅ Attendance</button>
      <button className={`btn ${tab==="lesson_log"?"btn-orange":""}`} onClick={()=>setTab("lesson_log")}>📔 Lesson Log</button>
    </div>
    {tab==="students" && <TeacherStudentReg db={db} user={user}/>}
    {tab==="fees" && <TeacherFeeCollect db={db} user={user}/>}
    {tab==="attendance" && setPage("attendance")}
    {tab==="lesson_log" && <LessonLog db={db} user={user}/>}
  </div>;
}

function TeacherStudentReg({db,user}){
  const [form,setForm]=React.useState({name:"",class_name:"",parent:"",phone:"",term_fee:""});
  const [classes,setClasses]=React.useState([]);
  const [saving,setSaving]=React.useState(false);
  const [done,setDone]=React.useState(null);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  React.useEffect(()=>{db.from("classes").select("*").order("name").then(({data})=>setClasses(data||[]));  },[]);

  const save=async()=>{
    if(!form.name||!form.class_name){alert("Fill in name and class!");return;}
    setSaving(true);
    const yr=new Date().getFullYear();
    const {count}=await db.from("students").select("*",{count:"exact",head:true});
    const num=String((count||0)+1).padStart(4,"0");
    const admission_no=`NJM-${yr}-${num}`;
    const control_number=`CTRL-${String(Math.floor(Math.random()*9000000000)+1000000000)}`;
    const {data,error}=await db.from("students").insert({
      name:form.name,
      class_name:form.class_name,
      parent:form.parent,
      phone:form.phone,
      term_fee:Number(form.term_fee)||0,
      admission_no,
      control_number,
      admission_date:new Date().toISOString().slice(0,10),
      status:"Active"
    }).select().single();
    if(error){alert("Kosa: "+error.message);setSaving(false);return;}
    // Send SMS to parent
    if(form.phone){
      const msg=`Karibu! ${form.name} (${admission_no}) amesajiliwa Najman Education Centre. Nambari ya kulipa ada: ${control_number}. +255 742 415 133`;
      await sendSMS(form.phone,msg).catch(()=>{});
    }
    setDone({admission_no,control_number,name:form.name});
    setForm({name:"",class_name:"",parent:"",phone:"",term_fee:""});
    setSaving(false);
  };

  return <div className="card" style={{maxWidth:480}}>
    <div style={{fontWeight:800,marginBottom:12,color:C.accent}}>📝 Register New Student</div>
    {done&&<div style={{padding:10,background:"rgba(34,197,94,.1)",borderRadius:8,marginBottom:12,fontSize:13}}>
      ✅ <strong>{done.name}</strong> amesajiliwa!<br/>
      Namba: <strong>{done.admission_no}</strong> | Control: <strong>{done.control_number}</strong>
    </div>}
    <div className="mb-10"><label className="label">Full Name *</label><input className="input" value={form.name} onChange={e=>F("name",e.target.value)} placeholder="Student's name"/></div>
    <div className="mb-10"><label className="label">Class *</label>
      <select className="input" value={form.class_name} onChange={e=>F("class_name",e.target.value)}>
        <option value="">-- Select Class --</option>
        {classes.map(c=><option key={c.id}>{c.name}</option>)}
      </select>
    </div>
    <div className="mb-10"><label className="label">Parent/Guardian Name</label><input className="input" value={form.parent} onChange={e=>F("parent",e.target.value)} placeholder="Parent/guardian name"/></div>
    <div className="mb-10"><label className="label">Parent Phone</label>
      <input className="input" value={form.phone} placeholder="7XXXXXXXX" onChange={e=>{
        let v=e.target.value.replace(/\D/g,"");
        if(v.startsWith("0"))v="255"+v.slice(1);
        else if(v.startsWith("7")||v.startsWith("6"))v="255"+v;
        F("phone",v);
      }}/>
      {form.phone&&<div style={{fontSize:12,color:C.green,marginTop:3}}>📱 {form.phone}</div>}
    </div>
    <div className="mb-12"><label className="label">Term Fee (TZS)</label><input className="input" type="number" value={form.term_fee} onChange={e=>F("term_fee",e.target.value)} placeholder="30000"/></div>
    <button className="btn btn-orange w-full" onClick={save} disabled={saving}>{saving?"⏳ Registering...":"✅ Register Student"}</button>
  </div>;
}

function TeacherFeeCollect({db,user}){
  const [students,setStudents]=React.useState([]);
  const [search,setSearch]=React.useState("");
  const [selected,setSelected]=React.useState(null);
  const [amount,setAmount]=React.useState("");
  const [method,setMethod]=React.useState("Cash");
  const [feeType,setFeeType]=React.useState("Term Fee");
  const [saving,setSaving]=React.useState(false);
  const [done,setDone]=React.useState(null);
  const [myRecent,setMyRecent]=React.useState([]);

  const [balInfo,setBalInfo]=React.useState(null);
  const [balLoading,setBalLoading]=React.useState(false);

  const teacherName=user?.profile?.full_name||user?.email||"Teacher";

  React.useEffect(()=>{
    db.from("students").select("*").eq("status","Active").order("name")
      .then(({data})=>setStudents(data||[]));
    loadMine();
  },[]);

  // Fetch balance ONLY for the one student the teacher has selected — never a list or school total
  React.useEffect(()=>{
    if(!selected){ setBalInfo(null); return; }
    setBalLoading(true);
    db.from("payments").select("amount").eq("student_id",selected.id)
      .then(({data})=>{
        const paid=(data||[]).reduce((s,p)=>s+Number(p.amount||0),0);
        const fee=Number(selected.term_fee||0);
        setBalInfo({paid,fee,bal:fee-paid});
        setBalLoading(false);
      });
  },[selected]);

  // Teacher only sees their OWN recorded payments (today) — never totals/collections across the school
  const loadMine=()=>{
    const todayStr=new Date().toISOString().slice(0,10);
    db.from("payments").select("*,students(name,class_name)")
      .eq("recorded_by_name",teacherName)
      .eq("payment_date",todayStr)
      .order("created_at",{ascending:false})
      .then(({data})=>setMyRecent(data||[]));
  };

  const printTeacherReceipt = (st,amt,method,feeTypeUsed,ref,payDate)=>{
    const w = window.open("","_blank");
    w.document.write(`<html><head><title>Receipt</title><style>body{font-family:Arial;max-width:310px;margin:auto;padding:18px;}.h{text-align:center;border-bottom:2px solid #111;padding-bottom:9px;margin-bottom:11px;}.row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px dashed #ddd;}.total{display:flex;justify-content:space-between;font-size:14px;font-weight:900;padding:7px 0;border-top:2px solid #111;}@page{size:A4;margin:10mm;}</style></head><body>
    <div class="h"><div style="font-size:15px;font-weight:900;">NAJMAN EDUCATION CENTRE</div><div style="font-size:10px;">KISHILI, MWANZA • +255 742 415 133</div></div>
    <div style="text-align:center;font-size:12px;font-weight:700;margin:9px 0;">🧾 PAYMENT RECEIPT</div>
    <div class="row"><b>No:</b><span>${ref}</span></div>
    <div class="row"><b>Student:</b><span>${st.name}</span></div><div class="row"><b>Class:</b><span>${st.class_name}</span></div>
    <div class="row"><b>Type:</b><span>${feeTypeUsed}</span></div>
    <div class="row"><b>Method:</b><span>${method}</span></div>
    <div class="row"><b>Date:</b><span>${payDate||new Date().toLocaleDateString()}</span></div>
    <div class="total"><span>Amount Paid:</span><span>TZS ${Number(amt).toLocaleString()}</span></div>
    <div class="row"><b>Received By:</b><span>${teacherName}</span></div>
    <div style="text-align:center;margin-top:14px;"><img src="${stampWithDate(payDate)}" style="width:180px;height:auto;"/></div>
    <div style="text-align:center;font-size:10px;color:#888;margin-top:8px;">Thank you! — IT CAN BE DONE</div>
    </body></html>`);
    w.document.close(); setTimeout(()=>w.print(),500);
  };

  const filtered=students.filter(s=>s.name?.toLowerCase().includes(search.toLowerCase()));

  const collect=async()=>{
    if(!selected||!amount){alert("Select a student and enter amount!");return;}
    setSaving(true);
    const ref=`RCP-${Date.now()}`;
    const d={
      student_id:selected.id,
      amount:Number(amount),
      month:MONTHS[new Date().getMonth()],
      fee_type:feeType,
      term:"Term 1",
      note:`Recorded by teacher: ${teacherName}`,
      method:method,
      payment_date:new Date().toISOString().slice(0,10),
      created_by:user.id,
      recorded_by_name:teacherName
    };
    const {error}=await db.from("payments").insert(d);
    if(error){ alert("Failed: "+error.message); setSaving(false); return; }
    // SMS receipt to parent
    if(selected.phone){
      const msg=`Umefanikiwa kulipa TZS ${Number(amount).toLocaleString()} kwa ${selected.name} (${selected.class_name}). Najman Education Centre. +255 742 415 133`;
      await sendSMS(selected.phone,msg).catch(()=>{});
    }
    printTeacherReceipt(selected,amount,method,feeType,ref,d.payment_date);
    setDone({name:selected.name,amount,ref,student:selected,method,feeType,payDate:d.payment_date});
    setSelected(null);setAmount("");setSaving(false);
    loadMine();
  };

  return <div className="card" style={{maxWidth:480}}>
    <div style={{fontWeight:800,marginBottom:4,color:C.accent}}>💰 Collect Fees</div>
    <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Payments you collect appear immediately for Admin, recorded under your name.</div>
    {done&&<div style={{padding:10,background:"rgba(34,197,94,.1)",borderRadius:8,marginBottom:12,fontSize:13}}>
      ✅ Fee for <strong>{done.name}</strong> TZS <strong>{Number(done.amount).toLocaleString()}</strong> received and sent to Admin!
      <div style={{marginTop:8}}><button className="btn-ghost" style={{fontSize:13}} onClick={()=>printTeacherReceipt(done.student,done.amount,done.method,done.feeType,done.ref,done.payDate)}>🧾 Chapisha Risiti Tena</button></div>
    </div>}
    <div className="mb-10"><input className="input" placeholder="🔍 Search student..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
    {!selected&&<div style={{maxHeight:200,overflowY:"auto",marginBottom:12}}>
      {filtered.map(s=><div key={s.id} onClick={()=>{setSelected(s);setSearch(s.name);}} style={{padding:"8px 12px",borderRadius:8,cursor:"pointer",background:C.surface,marginBottom:4,fontSize:14}}>
        <strong>{s.name}</strong> <span style={{color:C.textSoft}}>({s.class_name})</span>
      </div>)}
    </div>}
    {selected&&<>
      <div style={{padding:"8px 12px",background:"rgba(245,166,35,.1)",borderRadius:8,marginBottom:10,fontSize:13}}>
        👤 <strong>{selected.name}</strong> — {selected.class_name}
      </div>
      {balLoading&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>⏳ Inapakia deni...</div>}
      {balInfo&&!balLoading&&<div style={{padding:"8px 12px",background:balInfo.bal>0?"rgba(220,38,38,.08)":"rgba(34,197,94,.08)",borderRadius:8,marginBottom:10,fontSize:13}}>
        <div className="flex justify-between"><span>Total Fee:</span><span style={{fontWeight:700}}>TZS {balInfo.fee.toLocaleString()}</span></div>
        <div className="flex justify-between"><span>Amelipa Tayari:</span><span style={{fontWeight:700}}>TZS {balInfo.paid.toLocaleString()}</span></div>
        <div className="flex justify-between" style={{fontWeight:900,color:balInfo.bal>0?C.red:C.green,marginTop:2}}><span>{balInfo.bal>0?"Deni Lililobaki:":"✅ Amemaliza"}</span><span>{balInfo.bal>0?`TZS ${balInfo.bal.toLocaleString()}`:""}</span></div>
      </div>}
      <div className="mb-10"><label className="label">Amount (TZS) *</label><input className="input" type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="Weka kiasi"/></div>
      <div className="mb-10"><label className="label">Fee Type</label>
        <select className="input" value={feeType} onChange={e=>setFeeType(e.target.value)}>
          <option>Term Fee</option><option>Admission Fee</option><option>Uniform</option><option>Transport</option><option>Meals</option><option>Other</option>
        </select>
      </div>
      <div className="mb-12"><label className="label">Payment Method</label>
        <select className="input" value={method} onChange={e=>setMethod(e.target.value)}>
          <option>Cash</option><option>M-Pesa</option><option>Tigo Pesa</option><option>Airtel Money</option><option>Bank</option>
        </select>
      </div>
      <div className="flex gap-8">
        <button className="btn" onClick={()=>{setSelected(null);setSearch("");}}>✖ Ghairi</button>
        <button className="btn btn-orange" style={{flex:1}} onClick={collect} disabled={saving}>{saving?"⏳ Collecting...":"💰 Collect"}</button>
      </div>
    </>}
    {myRecent.length>0&&<div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #1f2e47"}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:C.textSoft}}>Ulizopokea leo</div>
      {myRecent.map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,padding:"5px 0",borderBottom:"1px dashed #1f2e47"}}>
        <span>{p.students?.name||"—"}</span>
        <div className="flex gap-8 align-center">
          <span style={{fontWeight:700,color:C.green}}>TZS {Number(p.amount).toLocaleString()}</span>
          <button className="btn-ghost" style={{padding:"2px 6px",fontSize:13}} onClick={()=>printTeacherReceipt(p.students||{name:p.students?.name,class_name:p.students?.class_name},p.amount,p.method,p.fee_type,`RCP-${p.id}`,p.payment_date)}>🧾</button>
        </div>
      </div>)}
    </div>}
  </div>;
}

// ── DUTY CHECK-IN — public QR scan page, no login required ──
function DutyCheckIn(){
  const [staff,setStaff]=useState([]);
  const [duty,setDuty]=useState(null);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState("");
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(null);
  const today=DAY_NAMES[new Date().getDay()];
  const isWeekend=today==="Saturday"||today==="Sunday";

  const load=async()=>{
    setLoading(true);
    const {data:d}=await db.from("duty_roster").select("*,staff(id,name,phone,photo_url)").eq("day",today).maybeSingle();
    setDuty(d||null);
    const {data:s}=await db.from("staff").select("id,name,role").eq("status","Active").order("name");
    setStaff(s||[]);
    if(d?.staff_id) setSelected(d.staff_id);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const checkIn=async()=>{
    if(!selected){alert("Please select your name first");return;}
    setSaving(true);
    const now=new Date();
    const timeStr=now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    if(duty){
      await db.from("duty_roster").update({staff_id:selected,checked_in_at:now.toISOString()}).eq("id",duty.id);
    } else {
      await db.from("duty_roster").insert({day:today,staff_id:selected,checked_in_at:now.toISOString()});
    }
    const staffName=staff.find(s=>s.id===selected)?.name||"";
    setDone({name:staffName,time:timeStr});
    setSaving(false);
  };

  const wrap=(inner)=><div style={{minHeight:"100vh",background:"linear-gradient(180deg,#1e3a5f 0%,#1a3050 60%,#162a4f 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#1a2236",borderRadius:16,padding:28,maxWidth:420,width:"100%",boxShadow:"0 10px 40px rgba(0,0,0,.3)",textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:6}}>🎖️</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:"#1e3a5f",marginBottom:4}}>Teacher on Duty</div>
      <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Najman Education Centre — {today}, {fmtDate()}</div>
      {inner}
    </div>
  </div>;

  if(loading) return wrap(<Spinner/>);

  if(isWeekend) return wrap(
    <div style={{padding:"20px 0",color:"#94a3b8"}}>🌤️ It's the weekend — no duty check-in today.</div>
  );

  if(done) return wrap(<div>
    <div style={{fontSize:50,marginBottom:10}}>✅</div>
    <div style={{fontSize:18,fontWeight:800,color:"#16a34a",marginBottom:4}}>Checked in successfully!</div>
    <div style={{fontSize:15,color:"#e8edf5"}}><strong>{done.name}</strong></div>
    <div style={{fontSize:13,color:"#64748b",marginTop:2}}>Arrived at {done.time}</div>
  </div>);

  return wrap(<div>
    {duty?.checked_in_at
      ? <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#16a34a"}}>
          ✅ {duty.staff?.name} already checked in at {new Date(duty.checked_in_at).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}
        </div>
      : <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#c2410c"}}>
          ⏳ No check-in recorded yet for today
        </div>
    }
    <div style={{textAlign:"left",marginBottom:14}}>
      <label style={{fontSize:12,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:.5}}>Select your name</label>
      <select className="input" style={{marginTop:6}} value={selected} onChange={e=>setSelected(e.target.value)}>
        <option value="">-- Select --</option>
        {staff.map(s=><option key={s.id} value={s.id}>{s.name}{s.role?` (${s.role})`:""}</option>)}
      </select>
    </div>
    <button className="btn btn-orange w-full" onClick={checkIn} disabled={saving}>{saving?"⏳ Checking in...":"✅ I'm Here — Check In"}</button>
  </div>);
}

function App() {
  const isDutyCheckIn = new URLSearchParams(window.location.search).get("duty")==="checkin";
  if(isDutyCheckIn) return <DutyCheckIn/>;

  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState("home");
  const [pageHistory, setPageHistory] = useState([]);
  const [menuOpen, setMenuOpen] = useState(false);

  const navigateTo = (newPage) => {
    setPageHistory(h => newPage === "home" ? [] : [...h, page]);
    setPage(newPage);
  };

  const goBack = () => {
    if(pageHistory.length === 0) return;
    const prev = pageHistory[pageHistory.length - 1];
    setPageHistory(h => h.slice(0, -1));
    setPage(prev);
  };

  useEffect(() => {
    document.getElementById("menuBtn").onclick = () => setMenuOpen(o=>!o);
    db.auth.getSession().then(async({data:{session}}) => {
      if(session) {
        const {data:p} = await db.from("user_profiles").select("*").eq("id",session.user.id).single();
        setUser({...session.user, profile:p});
        if(p?.role==="parent") navigateTo("parent");
      }
      setLoading(false);
    });
    db.auth.onAuthStateChange((e,s) => { if(e==="SIGNED_OUT"){setUser(null);setPage("home");setPageHistory([]);} });

    // ── AUTO LOGOUT after 30 minutes of inactivity ──────
    let timer;
    const resetTimer = () => {
      clearTimeout(timer);
      timer = setTimeout(async() => {
        await db.auth.signOut();
        alert("⏰ Session expired after 30 minutes of inactivity. Please log in again.");
      }, 30 * 60 * 1000); // 30 minutes
    };
    ["mousedown","mousemove","keypress","scroll","touchstart","click"].forEach(e =>
      document.addEventListener(e, resetTimer, true)
    );
    resetTimer();
    return () => {
      clearTimeout(timer);
      ["mousedown","mousemove","keypress","scroll","touchstart","click"].forEach(e =>

function Students({db,user}) {
  const [statusFilter,setStatusFilter] = useState("Active");
  const {data:allStudents,loading,refresh} = useDB("students",{order:"name"});
  const students = statusFilter==="All" ? allStudents : allStudents.filter(s=>s.status===statusFilter);
  const {data:classes} = useDB("classes",{order:"name"});
  const [modal,setModal] = useState(false);
  const [editId,setEditId] = useState(null);
  const [search,setSearch] = useState("");
  const [fClass,setFClass] = useState("All");
  const blank = {name:"",class_name:"",parent:"",phone:"",admission_date:fmtDate(),status:"Active",term_fee:"0",dob:"",gender:"",home_address:"",religion:"",previous_school:"",emergency_contact:"",medical_notes:""};
  const [form,setForm] = useState(blank);
  const F = (k,v) => setForm(f=>({...f,[k]:v}));

  const save = async() => {
    if(!form.name.trim()) return;
    let d = {
      name: form.name,
      class_name: form.class_name,
      parent: form.parent||"",
      phone: form.phone||"",
      admission_date: form.admission_date||fmtDate(),
      status: form.status||"Active",
      term_fee: Number(form.term_fee)||0,
      dob: form.dob||"",
      gender: form.gender||"",
      home_address: form.home_address||"",
      religion: form.religion||"",
      previous_school: form.previous_school||"",
      emergency_contact: form.emergency_contact||"",
      medical_notes: form.medical_notes||"",
    };
    if(!editId){
      // Auto-generate admission number
      const yr = new Date().getFullYear();
      const {count} = await db.from("students").select("*",{count:"exact",head:true});
      const num = String((count||0)+1).padStart(4,"0");
      d.admission_no = `NJM-${yr}-${num}`;
      // ── AUTO: Permanent Control Number (mara moja, inadumu milele) ──
      d.control_number = `CTRL-${String(Math.floor(Math.random()*9000000000)+1000000000)}`;
    }
    if(editId){ await db.from("students").update(d).eq("id",editId); }
    else {
      const {data:newSt,error:stErr} = await db.from("students").insert(d).select().single();
      if(stErr){ alert("Error saving student: "+stErr.message); return; }
      // ── AUTO: SMS to parent ──────────────────────────
      if(newSt){

        if(form.phone){
          const msg=`Dear ${form.parent||"Parent"}, ${form.name} (${d.admission_no}) amejiunga Najman Education Centre. Nambari ya kulipa ada: ${d.control_number}. Tumia nambari hii kulipa kila wakati. +255 742 415 133`;
          sendSMS(form.phone,msg).catch(()=>{});
        }
      }
    }
    refresh(); setModal(false); setEditId(null);
  };
  const del = async(id) => {
    if(!confirm("Deactivate/Left student?")) return;
    const st=allStudents.find(s=>s.id===id);
    await db.from("students").update({status:"Left"}).eq("id",id);
    if(st?.phone){
      const msg=`Taarifa: ${st.name} ameondolewa kwenye orodha ya wanafunzi wanaoendelea na masomo Najman Education Centre kuanzia leo. Kwa maswali wasiliana na shule. +255 742 415 133`;
      sendSMS(st.phone,msg).catch(()=>{});
    }
    refresh();
  };
  const reactivate = async(id) => { await db.from("students").update({status:"Active"}).eq("id",id); refresh(); };
  const graduate = async(id) => {
    if(!confirm("Mark as graduated?")) return;
    const st=allStudents.find(s=>s.id===id);
    await db.from("students").update({status:"Graduated"}).eq("id",id);
    if(st?.phone){
      const msg=`Hongera! ${st.name} amehitimu masomo yake Najman Education Centre. Asante kwa kuwa nasi. Tunamtakia kila la kheri katika hatua inayofuata. — Najman Education Centre, +255 742 415 133`;
      sendSMS(st.phone,msg).catch(()=>{});
    }
    refresh();
  };
  const filtered = students.filter(s=>(fClass==="All"||s.class_name===fClass)&&s.name.toLowerCase().includes(search.toLowerCase()));

  return <div>
    <div className="flex justify-between align-center mb-16">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>👦 Students</div>
      <button className="btn" onClick={()=>{setForm({...blank,class_name:classes[0]?.name||""});setEditId(null);setModal(true);}}>+ Add Student</button>
    </div>
    <div className="flex gap-10 mb-12 flex-wrap">
      {[{l:"Active",v:allStudents.filter(s=>s.status==="Active").length,c:C.green},
        {l:"Left",v:allStudents.filter(s=>s.status==="Left").length,c:C.red},
        {l:"Graduated",v:allStudents.filter(s=>s.status==="Graduated").length,c:C.blue},
        {l:"All",v:allStudents.length,c:C.muted}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,cursor:"pointer",opacity:statusFilter===x.l?1:.6}} onClick={()=>setStatusFilter(x.l)}>
          <div style={{fontSize:20,fontWeight:900,color:x.c}}>{x.v}</div>
          <div style={{fontSize:15,color:C.textSoft,marginTop:2}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div className="card flex gap-8 flex-wrap mb-10" style={{marginBottom:0}}>
      <input className="input" style={{flex:1,minWidth:140}} placeholder="🔍 Search student..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="input" style={{width:145}} value={fClass} onChange={e=>setFClass(e.target.value)}>
        <option>All</option>{classes.map(c=><option key={c.id}>{c.name}</option>)}
      </select>
      <button className="btn-ghost" style={{fontSize:13,padding:"8px 14px"}} onClick={()=>exportPDF(
        "Students List",
        ["#","Name","Class","Parent","Phone","Fee (TZS)","Status"],
        filtered.map((s,i)=>[i+1,s.name,s.class_name,s.parent||"—",s.phone||"—",Number(s.term_fee||0).toLocaleString(),s.status]),
        "students"
      )}>📄 PDF</button>
    </div>
    {loading?<Spinner/>:<div className="card">
      <table className="table">
        <thead><tr>{["#","Name","Class","Parent","Phone","Fee",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{filtered.map((s,i)=><tr key={s.id}>
          <td>{i+1}</td>
          <td className="fw-700">{s.name}</td>
          <td>{badge(C.blue,s.class_name)}</td>
          <td>{s.parent||"—"}</td>
          <td>{s.phone||"—"}</td>
          <td className="text-accent fw-700">{Number(s.term_fee||0).toLocaleString()}</td>
          <td>
            {badge(s.status==="Active"?C.green:s.status==="Left"?C.red:C.blue, s.status)}
            <button className="btn-ghost" style={{padding:"3px 7px",marginRight:3,fontSize:15}} onClick={()=>{setForm({...s,term_fee:String(s.term_fee||0)});setEditId(s.id);setModal(true);}}>✏️</button>
            {s.status==="Active"&&<button className="btn btn-red" style={{padding:"3px 7px",fontSize:15,marginRight:3}} onClick={()=>del(s.id)}>⏸️</button>}
            {s.status==="Active"&&<button className="btn" style={{padding:"3px 7px",fontSize:15,marginRight:3,background:"#6b7280"}} onClick={()=>graduate(s.id)}>🎓</button>}
            {s.status!=="Active"&&<button className="btn btn-green" style={{padding:"3px 7px",fontSize:15}} onClick={()=>reactivate(s.id)}>▶️ Reactivate</button>}
          </td>
        </tr>)}</tbody>
      </table>
      {filtered.length===0&&<div style={{padding:16,color:C.muted,textAlign:"center"}}>No students found</div>}
    </div>}
    {modal&&<div className="overlay"><div className="modal" style={{width:540}}>
      <div style={{fontWeight:900,fontSize:16,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>{editId?"Edit":"Add"} Student</div>
      {/* Photo Upload */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:14,padding:"12px 14px",background:"#151d30",borderRadius:12,border:"1px solid #1f2e47"}}>
        {/* Preview */}
        <div style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#1a3a6a,#f5a623)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,overflow:"hidden",border:"3px solid #f5a623",flexShrink:0}}>
          {form.photo_url?<img src={form.photo_url} style={{width:80,height:80,objectFit:"cover"}}/>:"👦"}
        </div>
        {/* Buttons */}
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:13,marginBottom:8,color:C.text}}>Student Photo</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {/* Gallery */}
            <label style={{cursor:"pointer"}}>
              <span className="btn-ghost" style={{fontSize:12,padding:"7px 14px",display:"block"}}>🖼️ Gallery</span>
              <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0];if(!file)return;
                const r=new FileReader();r.onload=ev=>F("photo_url",ev.target.result);r.readAsDataURL(file);
              }}/>
            </label>
            {/* Camera */}
            <label style={{cursor:"pointer"}}>
              <span className="btn-ghost" style={{fontSize:12,padding:"7px 14px",display:"block"}}>📷 Camera</span>
              <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0];if(!file)return;
                const r=new FileReader();r.onload=ev=>F("photo_url",ev.target.result);r.readAsDataURL(file);
              }}/>
            </label>
            {/* Remove */}
            {form.photo_url&&<button className="btn-ghost" style={{fontSize:12,padding:"7px 14px",color:C.red,borderColor:C.red}} onClick={()=>F("photo_url","")}>✕ Delete</button>}
          </div>
        </div>
      </div>
      <div className="grid-2">
        <div className="grid-full"><Field label="Full Name *" value={form.name} onChange={v=>F("name",v)}/></div>
        <div><Select label="Class" value={form.class_name} onChange={v=>F("class_name",v)} options={classes.map(c=>({v:c.name,l:c.name}))}/></div>
        <div><Field label="Term Fee (TZS)" value={form.term_fee} onChange={v=>F("term_fee",v)} type="number"/></div>
        <div><Field label="Admission Date" value={form.admission_date} onChange={v=>F("admission_date",v)} type="date"/></div>
        <div><Field label="Date of Birth" value={form.dob||""} onChange={v=>F("dob",v)} type="date"/></div>
        <div><Select label="Gender" value={form.gender||""} onChange={v=>F("gender",v)} options={[{v:"Male",l:"Male"},{v:"Female",l:"Female"}]}/></div>
        <div><Field label="Religion" value={form.religion||""} onChange={v=>F("religion",v)}/></div>
        <div className="grid-full"><Field label="Home Address / Street" value={form.home_address||""} onChange={v=>F("home_address",v)}/></div>
        <div className="grid-full"><Field label="Previous School" value={form.previous_school||""} onChange={v=>F("previous_school",v)}/></div>
        <div><Field label="Parent/Guardian Name" value={form.parent} onChange={v=>F("parent",v)}/></div>
        <div><Field label="Parent Phone" value={form.phone} onChange={v=>F("phone",v)}/></div>
        <div><Field label="Emergency Contact" value={form.emergency_contact||""} onChange={v=>F("emergency_contact",v)} placeholder="Alternative contact number for emergencies"/></div>
        <div className="grid-full"><label className="label">Health Condition (Allergies, Illnesses, etc.)</label><textarea className="input" style={{height:50,resize:"vertical"}} value={form.medical_notes||""} onChange={e=>F("medical_notes",e.target.value)}/></div>
      </div>
      <div className="flex gap-8 justify-between" style={{marginTop:14}}>
        <button className="btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
        <button className="btn" onClick={save}>💾 Save</button>
      </div>
    </div></div>}
  </div>;
}

// ── GRADUATED / LEFT STUDENTS ───────────────────────────
function GraduatedLeftStudents({db,user}){
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [fStatus,setFStatus]=useState("Graduated");
  const [fYear,setFYear]=useState("All");
  const [search,setSearch]=useState("");

  useEffect(()=>{(async()=>{
    setLoading(true);
    const{data}=await db.from("students").select("*").in("status",["Graduated","Left"]).order("name");
    setStudents(data||[]);
    setLoading(false);
  })();},[]);

  const reactivate=async(id)=>{
    if(!confirm("Restore this student to Active?"))return;
    await db.from("students").update({status:"Active"}).eq("id",id);
    setStudents(s=>s.filter(x=>x.id!==id));
  };

  const years=[...new Set(students.map(s=>(s.admission_date||"").slice(0,4)).filter(Boolean))].sort((a,b)=>b-a);

  const filtered=students.filter(s=>{
    if(s.status!==fStatus)return false;
    if(fYear!=="All"&&(s.admission_date||"").slice(0,4)!==fYear)return false;
    if(search&&!s.name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const printList=()=>{
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>${fStatus} Students</title><style>body{font-family:Arial;padding:20px;}h2{text-align:center;}table{width:100%;border-collapse:collapse;font-size:12px;}th,td{border:1px solid #ccc;padding:5px 9px;}th{background:#f5a623;}@page{size:A4;margin:14mm;}</style></head><body>
    <h2>NAJMAN — ${fStatus==="Graduated"?"Wahitimu":"Walioacha Masomo"}</h2><p style="text-align:center">Jumla: ${filtered.length}</p>
    <table><thead><tr><th>#</th><th>Name</th><th>Class</th><th>Admission No</th><th>Parent</th><th>Phone</th><th>Admission Date</th></tr></thead><tbody>
    ${filtered.map((s,i)=>`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.class_name}</td><td>${s.admission_no||"—"}</td><td>${s.parent||"—"}</td><td>${s.phone||"—"}</td><td>${s.admission_date||"—"}</td></tr>`).join("")}
    </tbody></table></body></html>`);
    w.document.close();setTimeout(()=>w.print(),500);
  };

  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>🎓 Wahitimu / Walioacha</div>
      <button className="btn-ghost" style={{fontSize:15}} onClick={printList}>🖨️ Print List</button>
    </div>

    <div className="flex gap-10 mb-12 flex-wrap">
      {[{l:"Graduated",v:students.filter(s=>s.status==="Graduated").length,c:C.blue,icon:"🎓"},
        {l:"Left",v:students.filter(s=>s.status==="Left").length,c:C.red,icon:"🚪"}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,cursor:"pointer",opacity:fStatus===x.l?1:.6,minWidth:120}} onClick={()=>setFStatus(x.l)}>
          <div style={{fontSize:20}}>{x.icon}</div>
          <div style={{fontSize:20,fontWeight:900,color:x.c}}>{x.v}</div>
          <div style={{fontSize:13,color:C.textSoft,marginTop:2}}>{x.l==="Graduated"?"Wahitimu":"Walioacha"}</div>
        </div>
      ))}
    </div>

    <div className="card flex gap-8 flex-wrap mb-10" style={{marginBottom:14}}>
      <input className="input" style={{flex:1,minWidth:140}} placeholder="🔍 Search by name..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="input" style={{width:130}} value={fYear} onChange={e=>setFYear(e.target.value)}>
        <option value="All">Miaka Yote</option>
        {years.map(y=><option key={y} value={y}>{y}</option>)}
      </select>
    </div>

    {loading&&<Spinner/>}
    {!loading&&<div className="card">
      <table className="table">
        <thead><tr>{["#","Name","Class","Admission No","Parent","Phone","Admission Date",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{filtered.map((s,i)=><tr key={s.id}>
          <td>{i+1}</td>
          <td className="fw-700">{s.name}</td>
          <td>{badge(C.blue,s.class_name)}</td>
          <td style={{fontSize:12}}>{s.admission_no||"—"}</td>
          <td>{s.parent||"—"}</td>
          <td>{s.phone||"—"}</td>
          <td style={{fontSize:12}}>{s.admission_date||"—"}</td>
          <td><button className="btn btn-green" style={{padding:"3px 8px",fontSize:12}} onClick={()=>reactivate(s.id)}>▶️ Reactivate</button></td>
        </tr>)}</tbody>
      </table>
      {filtered.length===0&&<div style={{padding:16,color:C.muted,textAlign:"center"}}>No records</div>}
    </div>}
  </div>;
}

function Attendance({db,user}) {
  const today = fmtDate();
  const [date,setDate] = useState(today);
  const {data:students} = useDB("students",{order:"name",eq:{status:"Active"}});
  const {data:classes} = useDB("classes",{order:"name"});
  const [att,setAtt] = useState([]);
  const [fClass,setFClass] = useState("All");

  useEffect(()=>{ db.from("attendance").select("*").eq("att_date",date).then(({data})=>setAtt(data||[])); },[date]);

  const getStatus = id => att.find(a=>a.student_id===id)?.status||null;

  const ATT_STATUSES = [
    {code:"P", label:"Present",  color:C.green,  icon:"✅"},
    {code:"A", label:"Absent",   color:C.red,    icon:"❌"},
    {code:"L", label:"Permission",color:"#a855f7",icon:"📋"},
  ];

  const mark = async(id,status) => {
    await db.from("attendance").upsert({student_id:id,att_date:date,status},{onConflict:"student_id,att_date"});
    const {data} = await db.from("attendance").select("*").eq("att_date",date);
    setAtt(data||[]);

    // ── AUTO: Flag frequent absentees (3+ absences this week) ──
    if(status==="A"){
      const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay()+1);
      const {data:weekAtt}=await db.from("attendance").select("*").eq("student_id",id).eq("status","A").gte("att_date",weekStart.toISOString().slice(0,10));
      if(weekAtt&&weekAtt.length>=3){
        const st=students.find(s=>s.id===id);
        if(st){
          // Save notification
          await db.from("notifications").insert({type:"urgent",icon:"⚠️",title:`Frequent Absence — ${st.name}`,description:`${st.name} (${st.class_name}) has been absent ${weekAtt.length} times this week!`,action:"attendance"});
          // SMS to parent

          if(st.phone){
            const msg=`Dear ${st.parent||"Parent"}, ${st.name} has been absent ${weekAtt.length} times this week. Please contact us urgently. Najman School +255 742 415 133`;
            sendSMS(st.phone,msg).catch(()=>{});
          }
        }
      }
    }
  };

  const markAll = async(status) => {
    const records = filtSt.map(s=>({student_id:s.id,att_date:date,status}));
    await db.from("attendance").upsert(records,{onConflict:"student_id,att_date"});
    const {data} = await db.from("attendance").select("*").eq("att_date",date);
    setAtt(data||[]);

    // ── AUTO: Send SMS to parents of absent students ──────
    if(status==="A"){
      const absentSt=filtSt.filter(s=>s.phone);
      let sent=0;
      for(const s of absentSt){
        const msg=`Dear ${s.parent||"Parent"}, your child ${s.name} (${s.class_name}) did NOT come to school today ${date}. Najman School +255 742 415 133`;
        try{
          const rs=await sendSMS(s.phone,msg);
          await db.from("sms_log").insert({recipient_name:s.name,phone:s.phone,message:msg,status:rs.ok?"sent":"failed",sent_at:new Date().toISOString()});
          if(rs.ok)sent++;
        }catch{}
      }
      if(sent>0)alert(`📲 ${sent} SMS sent to parents of absent students!`);
    }
  };

  const [attSearch,setAttSearch] = useState("");
  const filtSt = students.filter(s=>(fClass==="All"||s.class_name===fClass)&&s.name.toLowerCase().includes(attSearch.toLowerCase()));
  const present = att.filter(a=>a.status==="P").length;
  const absent  = att.filter(a=>a.status==="A").length;
  const permission = att.filter(a=>a.status==="L").length;

  const printAtt = () => {
    const w = window.open("","_blank");
    w.document.write(`<html><head><title>Attendance ${date}</title><style>
    body{font-family:Arial;padding:20px;}h2,h3{text-align:center;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th,td{border:1px solid #ccc;padding:6px 10px;}th{background:#f5a623;}
    .P{color:green;font-weight:700;}.A{color:red;font-weight:700;}.L{color:purple;font-weight:700;}
    @page{size:A4;margin:14mm;}
    </style></head><body>
    <h2>NAJMAN EDUCATION CENTRE</h2>
    <h3>Attendance Register — ${date}</h3>
    <p style="text-align:center">✅ Present: <b>${present}</b> | ❌ Absent: <b>${absent}</b> | 📋 Permission: <b>${permission}</b> | Total: <b>${filtSt.length}</b></p>
    <table><thead><tr><th>#</th><th>Name</th><th>Class</th><th>Status</th><th>Signature</th></tr></thead><tbody>
    ${filtSt.map((s,i)=>{const st=getStatus(s.id);return`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.class_name}</td><td class="${st||''}">${st==="P"?"✅ Present":st==="A"?"❌ Absent":st==="L"?"📋 Permission":"—"}</td><td></td></tr>`;}).join("")}
    </tbody></table></body></html>`);
    w.document.close(); setTimeout(()=>w.print(),500);
  };

  return <div>
    <div className="flex justify-between align-center mb-16 flex-wrap gap-8">
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>📋 Attendance</div>
      <div className="flex gap-8 flex-wrap">
        <input className="input" style={{width:155}} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        <select className="input" style={{width:140}} value={fClass} onChange={e=>setFClass(e.target.value)}>
          <option>All</option>{classes.map(c=><option key={c.id}>{c.name}</option>)}
        </select>
        <button className="btn-ghost" style={{fontSize:15}} onClick={printAtt}>🖨️ Print</button>
      </div>
    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[
        {l:"Present",  v:present,    c:C.green,   i:"✅"},
        {l:"Absent",   v:absent,     c:C.red,     i:"❌"},
        {l:"Permission",v:permission, c:"#a855f7", i:"📋"},
        {l:"Unmarked", v:filtSt.length-att.filter(a=>filtSt.find(s=>s.id===a.student_id)).length, c:C.muted, i:"—"},
      ].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,textAlign:"center",flex:1}}>
          <div style={{fontSize:22}}>{x.i}</div>
          <div style={{fontSize:24,fontWeight:900,color:x.c}}>{x.v}</div>
          <div style={{fontSize:13,color:C.textSoft,marginTop:2}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div className="card flex gap-8 mb-10 flex-wrap" style={{marginBottom:0}}>
      <input className="input" style={{flex:1,minWidth:140}} placeholder="🔍 Search students..." value={attSearch} onChange={e=>setAttSearch(e.target.value)}/>
      <button className="btn btn-green" style={{fontSize:13}} onClick={()=>markAll("P")}>✅ All Present</button>
      <button className="btn btn-red"   style={{fontSize:13}} onClick={()=>markAll("A")}>❌ All Absent</button>
      <button className="btn-ghost" style={{fontSize:13,padding:"8px 14px",background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.4)",color:"#a855f7"}} onClick={()=>markAll("L")}>📋 All Permission</button>
      <button className="btn-ghost" style={{fontSize:13,padding:"8px 14px"}} onClick={()=>exportPDF(
        `Attendance Register — ${date}`,
        ["#","Name","Class","Parent","Status"],
        filtSt.map((s,i)=>{const st=getStatus(s.id);return[i+1,s.name,s.class_name,s.parent||"—",st==="P"?"Present":st==="A"?"Absent":st==="L"?"Permission":"—"];}),
        "attendance"
      )}>📄 PDF</button>
    </div>
    <div className="card">
      <table className="table">
        <thead><tr>{["#","Name","Class","Parent","Attendance"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{filtSt.map((s,i)=>{
          const status = getStatus(s.id);
          return <tr key={s.id} style={{background:status==="P"?"rgba(34,197,94,.06)":status==="A"?"rgba(239,68,68,.06)":status==="L"?"rgba(168,85,247,.06)":"transparent"}}>
            <td>{i+1}</td>
            <td style={{fontSize:15,color:"#f5a623",fontWeight:700}}>{s.admission_no||"—"}</td>
            <td className="fw-700">{s.name}</td>
            <td>{badge(C.blue,s.class_name)}</td>
            <td>{s.parent||"—"}</td>
            <td style={{fontSize:15,color:C.green,fontWeight:700}}>{att.find(a=>a.staff_id===s.id)?.check_in||"—"}</td>
            <td style={{fontSize:15,color:C.red,fontWeight:700}}>{att.find(a=>a.staff_id===s.id)?.check_out||"—"}</td>
            <td>
              <button className="btn btn-green" style={{padding:"5px 8px",marginRight:3,fontSize:12,opacity:status==="P"?1:.4}} onClick={()=>mark(s.id,"P")}>✅ P</button>
              <button className="btn btn-red"   style={{padding:"5px 8px",marginRight:3,fontSize:12,opacity:status==="A"?1:.4}} onClick={()=>mark(s.id,"A")}>❌ A</button>
              <button style={{padding:"5px 8px",fontSize:12,opacity:status==="L"?1:.4,background:status==="L"?"rgba(168,85,247,.25)":"rgba(168,85,247,.08)",border:"1px solid rgba(168,85,247,.4)",borderRadius:7,cursor:"pointer",color:"#a855f7",fontWeight:700}} onClick={()=>mark(s.id,"L")}>📋 L</button>
              {status==="P"&&!att.find(a=>a.staff_id===s.id)?.check_out&&<button className="btn" style={{padding:"5px 8px",fontSize:12,background:"#f97316"}} onClick={()=>checkOut(s.id)}>🚪</button>}
            </td>
          </tr>;
        })}</tbody>
      </table>
      {filtSt.length===0&&<div style={{padding:16,color:C.muted,textAlign:"center"}}>No students found</div>}
    </div>
  </div>;
}

function Fees({db,user}) {

  const [tab,setTab] = useState("overview");
  const [modal,setModal] = useState(false);
  const [editP,setEditP] = useState(null);

  const [form,setForm] = useState(blank);
  const F = (k,v) => setForm(f=>({...f,[k]:v}));

  const load = async() => {
    setLoading(true);
    const {data} = await db.from("payments").select("*,students(name,class_name,parent,phone)").order("payment_date",{ascending:false});
    setPayments(data||[]); setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const paidFor = id => payments.filter(p=>p.student_id===id).reduce((s,p)=>s+p.amount,0);
  const debtFor = id => Math.max(0,Number(students.find(s=>s.id===id)?.term_fee||0)-paidFor(id));
  const statusOf = id => { const b=debtFor(id),f=Number(students.find(s=>s.id===id)?.term_fee||0); return b<=0?"Paid":b<f?"Partial":"Unpaid"; };

      await db.from("payments").insert(d);
      // ── AUTO RECEIPT ────────────────────────────────

        const allPmts = [...payments.filter(p=>p.student_id===st.id), {...d,payment_date:form.payment_date}];
        const totalPaidNow = allPmts.reduce((s,p)=>s+Number(p.amount),0);

        const w=window.open("","_blank");

        .hd{text-align:center;border-bottom:3px double #111;padding-bottom:10px;margin-bottom:12px;}

        .bal{text-align:center;margin-top:8px;padding:6px;border-radius:6px;font-weight:900;}
        .stamp{text-align:center;margin-top:14px;padding:8px;border:2px solid #f5a623;border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#f5a623;margin:14px auto 0;}
        @page{size:80mm auto;margin:3mm;}
        </style></head><body>
        <div class="hd">
          <div style="font-size:16px;font-weight:900;letter-spacing:2px;">NAJMAN EDUCATION CENTRE</div>
          <div style="font-size:10px;color:#555;">Kishili, Mwanza • +255 742 415 133</div>
          <div style="font-size:12px;font-weight:700;margin-top:5px;">🧾 PAYMENT RECEIPT</div>
          <div style="font-size:10px;color:#888;">No: ${rcptNo}</div>
        </div>
        <div class="row"><b>Student:</b><span>${st.name}</span></div>
        <div class="row"><b>Class:</b><span>${st.class_name}</span></div>
        <div class="row"><b>Parent:</b><span>${st.parent||"—"}</span></div>

        <div class="row"><b>Term:</b><span>${form.term}</span></div>
        <div class="row"><b>Method:</b><span>${form.method}</span></div>
        <div class="row"><b>Date:</b><span>${form.payment_date}</span></div>

        <div class="bal" style="background:${bal<=0?"#d1fae5":"#fee2e2"};color:${bal<=0?"#065f46":"#991b1b"};">
          ${bal<=0?"✅ FEES FULLY PAID":"⚠️ Deni: TZS "+bal.toLocaleString()}
        </div>
        <div style="text-align:center;margin-top:14px;"><img src="${stampWithDate(form.payment_date)}" style="width:180px;height:auto;"/></div>
        <div style="text-align:center;font-size:9px;color:#aaa;margin-top:8px;">Thank you! — Play Your Part</div>
        </body></html>`);
        w.document.close(); setTimeout(()=>w.print(),600);
      }

    load(); setModal(false); setEditP(null); setForm(blank);

  const filtSt = students.filter(s=>{
    if(fClass!=="All"&&s.class_name!==fClass) return false;
    if(fStatus!=="All"&&statusOf(s.id)!==fStatus) return false;

function Admissions({db,user}){
  const [apps,setApps]=useState([]);const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);const [editId,setEditId]=useState(null);
  const blank={full_name:"",parent:"",phone:"",apply_class:"",status:"Pending",app_date:fmtDate()};
  const [form,setForm]=useState(blank);

  const load=async()=>{setLoading(true);const{data}=await db.from("admissions").select("*").order("created_at",{ascending:false});setApps(data||[]);setLoading(false);};
  useEffect(()=>{load();},[]);

  const save=async()=>{
    if(!form.full_name.trim())return;
    const wasAdmitted = editId && apps.find(a=>a.id===editId)?.status!=="Admitted" && form.status==="Admitted";
    if(editId){ await db.from("admissions").update(form).eq("id",editId); }
    else { await db.from("admissions").insert(form); }

    // ── AUTO: When a student is registered → generate Student ID and summary
    if(form.status==="Admitted"&&(!editId||wasAdmitted)){
      const yr=new Date().getFullYear();
      // Check if student already exists
      const{data:existing}=await db.from("students").select("id").eq("name",form.full_name).limit(1);
      if(!existing||existing.length===0){
        const{count}=await db.from("students").select("*",{count:"exact",head:true});
        const admNo=`NJM-${yr}-${String((count||0)+1).padStart(4,"0")}`;
        await db.from("students").insert({
          name:form.full_name,parent:form.parent,phone:form.phone,
          class_name:form.apply_class,status:"Active",
          admission_no:admNo,admission_date:form.app_date,term_fee:0
        });
        // Auto SMS if phone exists

        if(form.phone){
          const msg=`Ndugu ${form.parent||form.full_name}, hongera! ${form.full_name} amekubaliwa rasmi katika Najman Education Centre. Number ya Usajili: ${admNo}. Karibu! +255 742 415 133`;
          sendSMS(form.phone,msg).catch(()=>{});
        }
        alert(`✅ Student ${form.full_name} registered!\nRegistration Number: ${admNo}\n${form.phone?"📲 SMS sent to parent!":""}`)
      }
    }
    load();setModal(false);setEditId(null);setForm(blank);
  };

  const del=async(id)=>{if(!confirm("Delete?"))return;await db.from("admissions").delete().eq("id",id);load();};

  const STATUS_C={Pending:C.accent,Admitted:C.green,Rejected:C.red};
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>📝 Admission Requests</div>
      <button className="btn" onClick={()=>{setForm(blank);setEditId(null);setModal(true);}}>+ New Application</button>
    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[{l:"All",v:apps.length,c:C.blue},{l:"Pending",v:apps.filter(a=>a.status==="Pending").length,c:C.accent},{l:"Admitted",v:apps.filter(a=>a.status==="Admitted").length,c:C.green},{l:"Rejected",v:apps.filter(a=>a.status==="Rejected").length,c:C.red}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:900,color:x.c}}>{x.v}</div><div style={{fontSize:12,color:C.textSoft}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div style={{background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.3)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.textSoft}}>
      💡 <strong>Auto:</strong> If a request is marked "Admitted" → the student is registered automatically in the system + an SMS is sent to the parent!
    </div>
    {loading?<Spinner/>:<div className="card">
      <table className="table">
        <thead><tr>{["Name","Parent","Phone","Class","Status","Date",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{apps.map(a=><tr key={a.id}>
          <td style={{fontWeight:700}}>{a.full_name}</td>
          <td>{a.parent||"—"}</td><td>{a.phone||"—"}</td>
          <td>{badge(C.blue,a.apply_class||"—")}</td>
          <td>{badge(STATUS_C[a.status]||C.muted,a.status)}</td>
          <td style={{fontSize:11,color:C.muted}}>{a.app_date||"—"}</td>
          <td style={{display:"flex",gap:4}}>
            <button className="btn-ghost" style={{padding:"3px 8px",fontSize:12}} onClick={()=>{setForm({full_name:a.full_name,parent:a.parent||"",phone:a.phone||"",apply_class:a.apply_class||"",status:a.status,app_date:a.app_date||fmtDate()});setEditId(a.id);setModal(true);}}>✏️</button>
            <button className="btn-ghost" style={{padding:"3px 8px",fontSize:12,color:C.red}} onClick={()=>del(a.id)}>🗑️</button>
          </td>
        </tr>)}</tbody>
      </table>
      {apps.length===0&&<div style={{padding:16,textAlign:"center",color:C.muted}}>No applications yet</div>}
    </div>}
    {modal&&<div className="overlay"><div className="modal">
      <div style={{fontWeight:900,fontSize:16,marginBottom:14,fontFamily:"'Playfair Display',serif"}}>{editId?"✏️ Edit Application":"📝 New Application"}</div>
      <Field label="Name Kamili *" value={form.full_name} onChange={v=>setForm(f=>({...f,full_name:v}))}/>
      <Field label="Parent Name" value={form.parent} onChange={v=>setForm(f=>({...f,parent:v}))}/>
      <Field label="Phone" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))}/>
      <Field label="Class Analoomba" value={form.apply_class} onChange={v=>setForm(f=>({...f,apply_class:v}))}/>
      <Select label="Status" value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={["Pending","Admitted","Rejected"]}/>
      <Field label="Date" value={form.app_date} onChange={v=>setForm(f=>({...f,app_date:v}))} type="date"/>
      {form.status==="Admitted"&&<div style={{padding:10,background:"rgba(22,163,74,.08)",border:"1px solid rgba(22,163,74,.3)",borderRadius:8,fontSize:12,marginBottom:10}}>✅ Admitting will auto-register the student immediately + send an SMS to the parent</div>}
      <div className="flex gap-8 justify-between" style={{marginTop:14}}>
        <button className="btn-ghost" onClick={()=>{setModal(false);setEditId(null);}}>Cancel</button>
        <button className="btn" onClick={save}>{editId?"Save":"Submit"}</button>
      </div>
    </div></div>}
  </div>;
}

// Determine whether a class is Pre-Unit/Nursery/Daycare (morning-only) or Std 1-7 (full day)
function isEarlyChildhoodClass(className){
  if(!className) return false;
  const n=className.toLowerCase();
  return n.includes("pre")||n.includes("nursery")||n.includes("day care")||n.includes("daycare")||n.includes("kindergarten")||n.includes("kg");
}
// Two distinct period sets, selected per-class
const PERIODS_ECD=["07:45-08:30","08:30-09:15","09:15-10:00","Break","10:20-11:00","11:00-11:40","11:40-12:20","Lunch"];
const PERIODS_STD=["15:00-15:40","15:40-16:20","Break","16:30-17:10","17:10-17:45"];
function getPeriodsForClass(className){
  return isEarlyChildhoodClass(className)?PERIODS_ECD:PERIODS_STD;
}
function getBreakLabel(period,className){
  const ecd=isEarlyChildhoodClass(className);
  if(period==="Break") return ecd?"SHORT BREAK (10:00 - 10:20)":"SHORT BREAK (16:20 - 16:30)";
  if(period==="Lunch") return ecd?"END OF DAY — Parents to pick up (12:20 - 13:00)":"LUNCH BREAK";
  return period;
}

// ── LIVE SCHOOL ACTIVITY (real-time "what's happening now" per class) ──
// Parses a "HH:MM-HH:MM" period string against the current clock.
function periodStatus(periodStr,now){
  const m=periodStr.match(/^(\d{2}):(\d{2})-(\d{2}):(\d{2})$/);
  if(!m) return "future";
  const start=Number(m[1])*60+Number(m[2]);
  const end=Number(m[3])*60+Number(m[4]);
  const cur=now.getHours()*60+now.getMinutes();
  if(cur<start) return "future";
  if(cur>=start&&cur<end) return "now";
  return "past";
}
const DAY_NAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DUTY_DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday"];
