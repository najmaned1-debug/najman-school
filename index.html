function ControlNumbers({db,user}){
  if(!canAccessFees(user)) return <FeeAccessDenied/>;
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [fClass,setFClass]=useState("All");
  const {data:classes}=useDB("classes",{order:"name"});
  const [feeSettings,setFeeSettings]=useState({mpesa_number:"",mpesa_name:"Najman School",tigopesa_number:"",airtel_number:"",bank_account:"",bank_name:"CRDB"});

  const load=async()=>{
    setLoading(true);
    const {data}=await db.from("students").select("id,name,class_name,admission_no,control_number,term_fee,parent,phone,status").eq("status","Active").order("name");
    setStudents(data||[]);
    setLoading(false);
  };

  useEffect(()=>{
    load();
    db.from("settings").select("fee_config").eq("id",1).single().then(({data})=>{
      if(data?.fee_config){try{const c=JSON.parse(data.fee_config);setFeeSettings(p=>({...p,...c}));}catch{}}
    });
  },[]);

  // Generate control number for students who don't have one yet
  const assignCtrl=async(st)=>{
    const ctrl=`CTRL-${String(Math.floor(Math.random()*9000000000)+1000000000)}`;
    await db.from("students").update({control_number:ctrl}).eq("id",st.id);
    // SMS

    if(st.phone){
      const msg=`Dear ${st.parent||"Parent"}, nambari ya kudumu ya kulipa ada kwa ${st.name}: ${ctrl}. Tumia nambari hii kulipa kila term. Najman Education Centre +255 742 415 133`;
      sendSMS(st.phone,msg).catch(()=>{});
    }
    load();
  };

  const printCtrl=(st)=>{
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>Control Number</title><style>
      body{font-family:Arial;padding:24px;max-width:480px;margin:auto;}
      .hd{text-align:center;border-bottom:3px solid #f5a623;padding-bottom:10px;margin-bottom:14px;}
      .ctrl{font-size:28px;font-weight:900;text-align:center;color:#1a4a9f;letter-spacing:3px;padding:16px;border:3px dashed #f5a623;border-radius:8px;margin:14px 0;}
      table{width:100%;border-collapse:collapse;font-size:13px;}
      td{padding:7px 10px;border:1px solid #ddd;}
      .label{background:#f5f5f5;font-weight:700;width:40%;}
      .perm{text-align:center;margin-top:10px;color:#7c3aed;font-weight:700;font-size:12px;border:1px solid #7c3aed;border-radius:6px;padding:6px;}
      @page{size:A6;margin:10mm;}
    </style></head><body>
    <div class="hd">
      <div style="font-size:18px;font-weight:900;">NAJMAN EDUCATION CENTRE</div>
      <div style="font-size:10px;color:#555;">KISHILI, MWANZA • +255 742 415 133</div>
      <div style="font-size:14px;font-weight:700;margin-top:6px;">NAMBARI YA KULIPA ADA</div>
    </div>
    <div class="ctrl">${st.control_number}</div>
    <table>
      <tr><td class="label">Name:</td><td><strong>${st.name}</strong></td></tr>
      <tr><td class="label">Class:</td><td>${st.class_name||"—"}</td></tr>
      <tr><td class="label">Adm No:</td><td>${st.admission_no||"—"}</td></tr>
      <tr><td class="label">Term Fee:</td><td><strong>TZS ${Number(st.term_fee||0).toLocaleString()}</strong></td></tr>
    </table>
    <div class="perm">♾️ NAMBARI HII NI YA KUDUMU — TUMIA KILA WAKATI</div>
    <div style="margin-top:12px;padding:10px;background:#f9f9f9;border:1px solid #ddd;border-radius:6px;font-size:11px;">
      <strong>Payment Methods:</strong><br/>
      ${feeSettings.mpesa_number?`M-Pesa: <strong>${feeSettings.mpesa_number}</strong> (${feeSettings.mpesa_name||"Najman School"})<br/>`:""}
      ${feeSettings.tigopesa_number?`Tigo Pesa: <strong>${feeSettings.tigopesa_number}</strong><br/>`:""}
      ${feeSettings.airtel_number?`Airtel Money: <strong>${feeSettings.airtel_number}</strong><br/>`:""}
      ${feeSettings.bank_account?`Benki (${feeSettings.bank_name}): <strong>${feeSettings.bank_account}</strong>`:""}
    </div>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),500);
  };

  const sendCtrlSMS=async(st)=>{
    if(!st.phone){alert("Student has no phone number!");return;}


    const msg=`Dear ${st.parent||"Parent"}, nambari ya kudumu ya kulipa ada kwa ${st.name} (${st.class_name}): ${st.control_number}. Ada ya Term: TZS ${Number(st.term_fee||0).toLocaleString()}. Najman Education Centre +255 742 415 133`;
    const r=await sendSMS(st.phone,msg);
    await db.from("sms_log").insert({recipient_name:st.name,phone:st.phone,message:msg,status:r.ok?"sent":"failed"});
    alert(r.ok?"✅ SMS imetumwa!":"❌ SMS haikutumwa. Angalia SMS Settings.");
  };

  const withCtrl=students.filter(s=>s.control_number);
  const noCtrl=students.filter(s=>!s.control_number);
  const filtered=withCtrl.filter(s=>
    (fClass==="All"||s.class_name===fClass)&&
    (s.name?.toLowerCase().includes(search.toLowerCase())||s.control_number?.toLowerCase().includes(search.toLowerCase()))
  );

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>🔢 Control Numbers <span className="v4-badge">v7.0</span></div>
    </div>

    {/* Stat Cards */}
    <div className="flex gap-10 mb-14 flex-wrap">
      {[
        {l:"Wana Nambari",v:withCtrl.length,c:C.green},
        {l:"Hawana Nambari",v:noCtrl.length,c:C.red},
        {l:"Students Wote",v:students.length,c:C.blue},
      ].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,color:x.c}}>{x.v}</div>
          <div style={{fontSize:13,color:C.textSoft,marginTop:2}}>{x.l}</div>
        </div>
      ))}
    </div>

    {/* Students without control number */}
    {noCtrl.length>0&&<div className="card" style={{marginBottom:14,border:"1px solid rgba(239,68,68,.3)",background:"rgba(239,68,68,.04)"}}>
      <div style={{fontWeight:800,color:C.red,marginBottom:10,fontSize:14}}>⚠️ Students {noCtrl.length} have no Control Number — Click "Assign" to give them one</div>
      <table className="table">
        <thead><tr>{["Name","Class","Adm No",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{noCtrl.map(s=><tr key={s.id}>
          <td style={{fontWeight:700}}>{s.name}</td>
          <td>{badge(C.blue,s.class_name||"—")}</td>
          <td style={{fontSize:11,color:C.muted}}>{s.admission_no||"—"}</td>
          <td><button className="btn btn-green" style={{padding:"4px 10px",fontSize:12}} onClick={()=>assignCtrl(s)}>+ Assign</button></td>
        </tr>)}</tbody>
      </table>
    </div>}

    {/* Filter */}
    <div className="flex gap-8 mb-12 flex-wrap">
      <input className="input" style={{flex:1,minWidth:150}} placeholder="🔍 Search by name or number..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="input" style={{width:150}} value={fClass} onChange={e=>setFClass(e.target.value)}>
        <option>All</option>{classes.map(c=><option key={c.id}>{c.name}</option>)}
      </select>
    </div>

    {/* Main Table */}
    {loading?<Spinner/>:<div className="card">
      <table className="table">
        <thead><tr>{["Control Number","Name","Class","Adm No","Fee/Term",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{filtered.map(s=><tr key={s.id}>
          <td><span style={{fontFamily:"monospace",fontWeight:900,color:"#7c3aed",fontSize:13,background:"rgba(124,58,237,.08)",padding:"3px 8px",borderRadius:6}}>{s.control_number}</span></td>
          <td style={{fontWeight:700}}>{s.name}</td>
          <td>{badge(C.blue,s.class_name||"—")}</td>
          <td style={{fontSize:11,color:C.muted}}>{s.admission_no||"—"}</td>
          <td style={{fontWeight:900,color:C.green}}>TZS {Number(s.term_fee||0).toLocaleString()}</td>
          <td>
            <div className="flex gap-4">
              <button className="btn-ghost" style={{padding:"3px 7px",fontSize:12}} title="Print" onClick={()=>printCtrl(s)}>🖨️</button>
              <button className="btn-ghost" style={{padding:"3px 7px",fontSize:12}} title="SMS" onClick={()=>sendCtrlSMS(s)}>📲</button>
            </div>
          </td>
        </tr>)}</tbody>
      </table>
      {filtered.length===0&&<div style={{padding:16,color:C.muted,textAlign:"center"}}>No students found</div>}
    </div>}
  </div>;
}

// ── LIBRARY MANAGEMENT ────────────────────────────────────
function Library({db,user}){
  const [tab,setTab]=useState("books");
  const {data:books,refresh:rbk}=useDB("library_books",{order:"title"});
  const {data:borrows,refresh:rbr}=useDB("library_borrows",{order:"borrow_date",ascending:false});
  const {data:students}=useDB("students",{order:"name",eq:{status:"Active"}});
  const [modal,setModal]=useState(false);
  const [bModal,setBModal]=useState(false);
  const [form,setForm]=useState({title:"",author:"",isbn:"",category:"",total_copies:1,available_copies:1,shelf_location:""});
  const [bForm,setBForm]=useState({student_id:"",book_id:"",borrow_date:fmtDate(),due_date:"",status:"Borrowed"});
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState("");

  const saveBook=async()=>{
    if(!form.title.trim())return;
    if(editId) await db.from("library_books").update(form).eq("id",editId);
    else await db.from("library_books").insert(form);
    rbk();setModal(false);setEditId(null);setForm({title:"",author:"",isbn:"",category:"",total_copies:1,available_copies:1,shelf_location:""});
  };

  const saveBorrow=async()=>{
    if(!bForm.student_id||!bForm.book_id)return;
    await db.from("library_borrows").insert({...bForm,created_by:user.id});
    // Reduce available copies
    const bk=books.find(b=>b.id===bForm.book_id);
    if(bk) await db.from("library_books").update({available_copies:Math.max(0,(bk.available_copies||1)-1)}).eq("id",bForm.book_id);
    rbk();rbr();setBModal(false);setBForm({student_id:"",book_id:"",borrow_date:fmtDate(),due_date:"",status:"Borrowed"});
  };

  const returnBook=async(b)=>{
    await db.from("library_borrows").update({status:"Returned",return_date:fmtDate()}).eq("id",b.id);
    const bk=books.find(bk=>bk.id===b.book_id);
    if(bk) await db.from("library_books").update({available_copies:(bk.available_copies||0)+1}).eq("id",b.book_id);
    rbk();rbr();
  };

  const filtBooks=books.filter(b=>b.title?.toLowerCase().includes(search.toLowerCase())||b.author?.toLowerCase().includes(search.toLowerCase()));
  const overdue=borrows.filter(b=>b.status==="Borrowed"&&b.due_date&&b.due_date<fmtDate());

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>📚 Library Management</div>
      <div style={{display:"flex",gap:8}}>
        {tab==="books"&&<button className="btn" onClick={()=>{setForm({title:"",author:"",isbn:"",category:"",total_copies:1,available_copies:1,shelf_location:""});setEditId(null);setModal(true);}}>+ Add Book</button>}
        {tab==="borrows"&&<button className="btn" onClick={()=>setBModal(true)}>+ Issue Book</button>}
      </div>
    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[{l:"Total Books",v:books.length,c:C.blue},{l:"Available",v:books.reduce((s,b)=>s+(b.available_copies||0),0),c:C.green},{l:"Borrowed",v:borrows.filter(b=>b.status==="Borrowed").length,c:C.accent},{l:"Overdue",v:overdue.length,c:C.red}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,color:x.c}}>{x.v}</div>
          <div style={{fontSize:12,color:C.textSoft}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div className="flex gap-6 mb-14 flex-wrap">
      {[["books","📚 Books"],["borrows","📋 Issued Books"],["overdue","⚠️ Overdue"]].map(([id,lbl])=>(
        <button key={id} className={`tab-btn ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
      ))}
    </div>

    {tab==="books"&&<div>
      <input className="input" style={{marginBottom:12,maxWidth:300}} placeholder="🔍 Search books..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div className="card">
        <table className="table"><thead><tr>{["Title","Author","ISBN","Category","Total","Available","Location",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{filtBooks.map(b=><tr key={b.id}>
          <td style={{fontWeight:700}}>{b.title}</td>
          <td>{b.author||"—"}</td>
          <td style={{fontSize:11,color:C.muted}}>{b.isbn||"—"}</td>
          <td>{b.category||"—"}</td>
          <td style={{textAlign:"center"}}>{b.total_copies||0}</td>
          <td style={{textAlign:"center"}}>{badge(b.available_copies>0?C.green:C.red,b.available_copies||0)}</td>
          <td style={{fontSize:12}}>{b.shelf_location||"—"}</td>
          <td style={{display:"flex",gap:4}}>
            <button className="btn-ghost" style={{padding:"3px 8px",fontSize:12}} onClick={()=>{setForm({title:b.title,author:b.author||"",isbn:b.isbn||"",category:b.category||"",total_copies:b.total_copies||1,available_copies:b.available_copies||1,shelf_location:b.shelf_location||""});setEditId(b.id);setModal(true);}}>✏️</button>
          </td>
        </tr>)}</tbody></table>
        {filtBooks.length===0&&<div style={{padding:16,textAlign:"center",color:C.muted}}>No books found</div>}
      </div>
    </div>}

    {tab==="borrows"&&<div className="card">
      <table className="table"><thead><tr>{["Student","Book","Issued","Due","Status",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{borrows.filter(b=>b.status==="Borrowed").map(b=><tr key={b.id}>
        <td style={{fontWeight:700}}>{b.students?.name||"—"}</td>
        <td>{b.library_books?.title||"—"}</td>
        <td style={{fontSize:11}}>{b.borrow_date}</td>
        <td style={{fontSize:11,color:b.due_date<fmtDate()?C.red:C.text}}>{b.due_date||"—"}</td>
        <td>{badge(b.status==="Returned"?C.green:b.due_date<fmtDate()?C.red:C.accent,b.status)}</td>
        <td><button className="btn-ghost" style={{padding:"3px 8px",fontSize:12,color:C.green}} onClick={()=>returnBook(b)}>↩ Return</button></td>
      </tr>)}</tbody></table>
    </div>}

    {tab==="overdue"&&<div className="card">
      <div style={{fontWeight:800,color:C.red,marginBottom:10}}>⚠️ {overdue.length} Overdue Books</div>
      <table className="table"><thead><tr>{["Student","Book","Due Date","Days Overdue"].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{overdue.map(b=>{
        const days=Math.floor((new Date()-new Date(b.due_date))/86400000);
        return<tr key={b.id}>
          <td style={{fontWeight:700}}>{b.students?.name||"—"}</td>
          <td>{b.library_books?.title||"—"}</td>
          <td style={{color:C.red}}>{b.due_date}</td>
          <td>{badge(C.red,days+" days")}</td>
        </tr>;
      })}</tbody></table>
      {overdue.length===0&&<div style={{padding:16,textAlign:"center",color:C.green,fontWeight:700}}>🎉 No overdue books!</div>}
    </div>}

    {modal&&<div className="overlay"><div className="modal">
      <div style={{fontWeight:900,fontSize:16,marginBottom:14}}>{editId?"✏️ Edit Book":"📚 Add New Book"}</div>
      <div className="grid-2">
        <div className="grid-full"><Field label="Title *" value={form.title} onChange={v=>setForm(f=>({...f,title:v}))}/></div>
        <div><Field label="Author" value={form.author} onChange={v=>setForm(f=>({...f,author:v}))}/></div>
        <div><Field label="ISBN" value={form.isbn} onChange={v=>setForm(f=>({...f,isbn:v}))}/></div>
        <div><Select label="Category" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={["Fiction","Non-Fiction","Science","Mathematics","History","Religion","Reference","Other"]}/></div>
        <div><Field label="Total Copies" value={form.total_copies} onChange={v=>setForm(f=>({...f,total_copies:Number(v),available_copies:Number(v)}))} type="number"/></div>
        <div><Field label="Shelf Location" value={form.shelf_location} onChange={v=>setForm(f=>({...f,shelf_location:v}))}/></div>
      </div>
      <div className="flex gap-8 justify-between" style={{marginTop:14}}>
        <button className="btn-ghost" onClick={()=>{setModal(false);setEditId(null);}}>Cancel</button>
        <button className="btn" onClick={saveBook}>💾 Save</button>
      </div>
    </div></div>}

    {bModal&&<div className="overlay"><div className="modal">
      <div style={{fontWeight:900,fontSize:16,marginBottom:14}}>📋 Issue Book</div>
      <div className="mb-10"><label className="label">Student *</label>
        <select className="input" value={bForm.student_id} onChange={e=>setBForm(f=>({...f,student_id:e.target.value}))}>
          <option value="">-- Select Student --</option>
          {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.class_name})</option>)}
        </select></div>
      <div className="mb-10"><label className="label">Book *</label>
        <select className="input" value={bForm.book_id} onChange={e=>setBForm(f=>({...f,book_id:e.target.value}))}>
          <option value="">-- Select Book --</option>
          {books.filter(b=>b.available_copies>0).map(b=><option key={b.id} value={b.id}>{b.title} ({b.available_copies} available)</option>)}
        </select></div>
      <div className="grid-2">
        <div><Field label="Issue Date" value={bForm.borrow_date} onChange={v=>setBForm(f=>({...f,borrow_date:v}))} type="date"/></div>
        <div><Field label="Due Date *" value={bForm.due_date} onChange={v=>setBForm(f=>({...f,due_date:v}))} type="date"/></div>
      </div>
      <div className="flex gap-8 justify-between" style={{marginTop:14}}>
        <button className="btn-ghost" onClick={()=>setBModal(false)}>Cancel</button>
        <button className="btn" onClick={saveBorrow}>📋 Issue Book</button>
      </div>
    </div></div>}
  </div>;
}

// ── STAFF PAYROLL ─────────────────────────────────────────
function Payroll({db,user}){
  if(!canAccessFees(user)) return <FeeAccessDenied/>;
  const {data:staff}=useDB("staff",{order:"name",eq:{status:"Active"}});
  const {data:payroll,refresh}=useDB("payroll",{order:"pay_date",ascending:false});
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({staff_id:"",pay_date:fmtDate(),basic_salary:0,allowances:0,deductions:0,tax:0,net_salary:0,payment_method:"Cash",notes:"",status:"Paid"});
  const [editId,setEditId]=useState(null);

  const calcNet=()=>{
    const gross=Number(form.basic_salary)+Number(form.allowances);
    const net=gross-Number(form.deductions)-Number(form.tax);
    setForm(f=>({...f,net_salary:net}));
  };

  const save=async()=>{
    if(!form.staff_id)return;
    const d={...form,basic_salary:Number(form.basic_salary),allowances:Number(form.allowances),deductions:Number(form.deductions),tax:Number(form.tax),net_salary:Number(form.net_salary),created_by:user.id};
    if(editId) await db.from("payroll").update(d).eq("id",editId);
    else await db.from("payroll").insert(d);
    refresh();setModal(false);setEditId(null);
  };

  const printPayslip=(p)=>{
    const st=staff.find(s=>s.id===p.staff_id);
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>Payslip</title><style>body{font-family:Arial;max-width:400px;margin:auto;padding:20px;font-size:13px;}.hd{text-align:center;border-bottom:2px solid #f5a623;padding-bottom:8px;margin-bottom:12px;}.row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed #eee;}.total{display:flex;justify-content:space-between;font-weight:900;font-size:15px;padding:8px 0;border-top:3px double #333;margin-top:4px;}</style></head><body>
    <div class="hd"><div style="font-size:16px;font-weight:900;">NAJMAN EDUCATION CENTRE</div><div style="font-size:10px;color:#555;">Kishili, Mwanza • +255 742 415 133</div><div style="font-size:14px;font-weight:700;margin-top:5px;">PAYSLIP</div></div>
    <div class="row"><b>Staff Name:</b>${st?.name||"—"}</div>
    <div class="row"><b>Position:</b>${st?.position||"—"}</div>
    <div class="row"><b>Pay Date:</b>${p.pay_date}</div>
    <div class="row"><b>Method:</b>${p.payment_method}</div>
    <br/><div class="row"><b>Basic Salary:</b>TZS ${Number(p.basic_salary).toLocaleString()}</div>
    <div class="row"><b>Allowances:</b>TZS ${Number(p.allowances).toLocaleString()}</div>
    <div class="row"><b>Deductions:</b>-TZS ${Number(p.deductions).toLocaleString()}</div>
    <div class="row"><b>Tax:</b>-TZS ${Number(p.tax).toLocaleString()}</div>
    <div class="total"><span>NET SALARY:</span><span>TZS ${Number(p.net_salary).toLocaleString()}</span></div>
    <p style="font-size:10px;text-align:center;margin-top:12px;color:#aaa;">Najman School Management System v7.0</p>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),500);
  };

  const monthlyTotal=payroll.filter(p=>p.pay_date?.startsWith(fmtDate().slice(0,7))).reduce((s,p)=>s+Number(p.net_salary||0),0);

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>💵 Staff Payroll</div>
      <button className="btn" onClick={()=>{setForm({staff_id:"",pay_date:fmtDate(),basic_salary:0,allowances:0,deductions:0,tax:0,net_salary:0,payment_method:"Cash",notes:"",status:"Paid"});setEditId(null);setModal(true);}}>+ Process Payment</button>
    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[{l:"This Month",v:`TZS ${monthlyTotal.toLocaleString()}`,c:C.green},{l:"Staff Count",v:staff.length,c:C.blue},{l:"Payments Made",v:payroll.filter(p=>p.pay_date?.startsWith(fmtDate().slice(0,7))).length,c:C.accent}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,textAlign:"center"}}>
          <div style={{fontSize:x.l==="This Month"?14:22,fontWeight:900,color:x.c}}>{x.v}</div>
          <div style={{fontSize:12,color:C.textSoft}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div className="card">
      <table className="table"><thead><tr>{["Staff","Date","Basic","Allowances","Deductions","Tax","Net Salary","Method",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{payroll.map(p=><tr key={p.id}>
        <td style={{fontWeight:700}}>{p.staff?.name||staff.find(s=>s.id===p.staff_id)?.name||"—"}</td>
        <td style={{fontSize:11}}>{p.pay_date}</td>
        <td>{Number(p.basic_salary||0).toLocaleString()}</td>
        <td style={{color:C.green}}>+{Number(p.allowances||0).toLocaleString()}</td>
        <td style={{color:C.red}}>-{Number(p.deductions||0).toLocaleString()}</td>
        <td style={{color:C.red}}>-{Number(p.tax||0).toLocaleString()}</td>
        <td style={{fontWeight:900,color:C.green}}>TZS {Number(p.net_salary||0).toLocaleString()}</td>
        <td>{badge(C.blue,p.payment_method||"—")}</td>
        <td style={{display:"flex",gap:4}}>
          <button className="btn-ghost" style={{padding:"3px 8px",fontSize:12}} onClick={()=>printPayslip(p)}>🖨️</button>

      <div className="mb-10"><label className="label">Staff Member *</label>

      <Field label="Notes" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))}/>

        <button className="btn-ghost" onClick={()=>{setModal(false);setEditId(null);}}>Cancel</button>
        <button className="btn" onClick={save}>💾 Process Payment</button>
      </div>
    </div></div>}
  </div>;
}

// ── ASSET/INVENTORY MANAGEMENT ───────────────────────────
function Assets({db,user}){
  const {data:assets,refresh}=useDB("assets",{order:"name"});
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({name:"",category:"Furniture",quantity:1,condition:"Good",purchase_date:"",purchase_price:0,location:"",description:"",status:"Active"});
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState("");

  const save=async()=>{
    if(!form.name.trim())return;
    const d={...form,purchase_price:Number(form.purchase_price),quantity:Number(form.quantity),created_by:user.id};
    if(editId) await db.from("assets").update(d).eq("id",editId);
    else await db.from("assets").insert(d);
    refresh();setModal(false);setEditId(null);
  };

  const COND_C={Good:C.green,Fair:C.accent,Poor:C.red,Damaged:"#7c3aed"};
  const filtAssets=assets.filter(a=>a.name?.toLowerCase().includes(search.toLowerCase())||a.category?.toLowerCase().includes(search.toLowerCase()));
  const totalValue=assets.reduce((s,a)=>s+Number(a.purchase_price||0)*Number(a.quantity||1),0);

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>🏛️ Assets & Inventory</div>

    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[{l:"Total Items",v:assets.length,c:C.blue},{l:"Total Value",v:`TZS ${totalValue.toLocaleString()}`,c:C.green},{l:"Good Condition",v:assets.filter(a=>a.condition==="Good").length,c:C.teal},{l:"Poor/Damaged",v:assets.filter(a=>["Poor","Damaged"].includes(a.condition)).length,c:C.red}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,textAlign:"center"}}>
          <div style={{fontSize:x.l==="Total Value"?12:22,fontWeight:900,color:x.c}}>{x.v}</div>
          <div style={{fontSize:12,color:C.textSoft}}>{x.l}</div>
        </div>
      ))}
    </div>
    <input className="input" style={{marginBottom:12,maxWidth:300}} placeholder="🔍 Search assets..." value={search} onChange={e=>setSearch(e.target.value)}/>
    <div className="card">
      <table className="table"><thead><tr>{["Name","Category","Qty","Condition","Location","Purchase Date","Value","Status",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{filtAssets.map(a=><tr key={a.id}>
        <td style={{fontWeight:700}}>{a.name}</td>
        <td>{badge(C.blue,a.category||"—")}</td>
        <td style={{textAlign:"center",fontWeight:700}}>{a.quantity||1}</td>
        <td>{badge(COND_C[a.condition]||C.muted,a.condition||"—")}</td>
        <td style={{fontSize:12}}>{a.location||"—"}</td>
        <td style={{fontSize:11,color:C.muted}}>{a.purchase_date||"—"}</td>
        <td style={{fontSize:12,color:C.green}}>TZS {(Number(a.purchase_price||0)*Number(a.quantity||1)).toLocaleString()}</td>
        <td>{badge(a.status==="Active"?C.green:C.red,a.status||"Active")}</td>
        <td><button className="btn-ghost" style={{padding:"3px 8px",fontSize:12}} onClick={()=>{setForm({name:a.name,category:a.category||"Furniture",quantity:a.quantity||1,condition:a.condition||"Good",purchase_date:a.purchase_date||"",purchase_price:a.purchase_price||0,location:a.location||"",description:a.description||"",status:a.status||"Active"});setEditId(a.id);setModal(true);}}>✏️</button></td>
      </tr>)}</tbody></table>
      {filtAssets.length===0&&<div style={{padding:16,textAlign:"center",color:C.muted}}>No assets added yet</div>}
    </div>
    {modal&&<div className="overlay"><div className="modal">
      <div style={{fontWeight:900,fontSize:16,marginBottom:14}}>{editId?"✏️ Edit Asset":"🏛️ Add New Asset"}</div>
      <div className="grid-2">
        <div className="grid-full"><Field label="Asset Name *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))}/></div>
        <div><Select label="Category" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={["Furniture","Electronics","Sports Equipment","Laboratory","Musical Instruments","Kitchen","Vehicles","Books","Other"]}/></div>
        <div><Field label="Quantity" value={form.quantity} onChange={v=>setForm(f=>({...f,quantity:Number(v)}))} type="number"/></div>
        <div><Select label="Condition" value={form.condition} onChange={v=>setForm(f=>({...f,condition:v}))} options={["Good","Fair","Poor","Damaged"]}/></div>
        <div><Field label="Purchase Date" value={form.purchase_date} onChange={v=>setForm(f=>({...f,purchase_date:v}))} type="date"/></div>
        <div><Field label="Purchase Price (TZS)" value={form.purchase_price} onChange={v=>setForm(f=>({...f,purchase_price:Number(v)}))} type="number"/></div>
        <div><Field label="Location" value={form.location} onChange={v=>setForm(f=>({...f,location:v}))}/></div>
        <div><Select label="Status" value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={["Active","Under Repair","Disposed"]}/></div>
        <div className="grid-full"><label className="label">Description</label><textarea className="input" style={{height:60,resize:"vertical"}} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></div>
      </div>
      <div className="flex gap-8 justify-between" style={{marginTop:14}}>
        <button className="btn-ghost" onClick={()=>{setModal(false);setEditId(null);}}>Cancel</button>
        <button className="btn" onClick={save}>💾 Save Asset</button>
      </div>
    </div></div>}
  </div>;
}

// ── DOCUMENT MANAGEMENT ───────────────────────────────────
function Documents({db,user}){
  const {data:docs,refresh}=useDB("documents",{order:"created_at",ascending:false});
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({title:"",category:"Policy",description:"",file_url:"",file_type:"PDF",access_level:"All Staff",academic_year:new Date().getFullYear().toString()});
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState("");
  const [fCat,setFCat]=useState("All");

  const save=async()=>{
    if(!form.title.trim())return;
    const d={...form,created_by:user.id};
    if(editId) await db.from("documents").update(d).eq("id",editId);
    else await db.from("documents").insert(d);
    refresh();setModal(false);setEditId(null);
  };

  const cats=["All",...new Set(docs.map(d=>d.category))];
  const filtDocs=docs.filter(d=>(fCat==="All"||d.category===fCat)&&(d.title?.toLowerCase().includes(search.toLowerCase())||d.description?.toLowerCase().includes(search.toLowerCase())));

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:21,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>📂 Document Management</div>
      <button className="btn" onClick={()=>{setForm({title:"",category:"Policy",description:"",file_url:"",file_type:"PDF",access_level:"All Staff",academic_year:new Date().getFullYear().toString()});setEditId(null);setModal(true);}}>+ Add Document</button>
    </div>
    <div className="flex gap-10 mb-14 flex-wrap">
      {[{l:"Total Docs",v:docs.length,c:C.blue},{l:"Policies",v:docs.filter(d=>d.category==="Policy").length,c:C.accent},{l:"Forms",v:docs.filter(d=>d.category==="Form").length,c:C.green},{l:"Reports",v:docs.filter(d=>d.category==="Report").length,c:"#a855f7"}].map(x=>(
        <div key={x.l} className="stat-card" style={{borderTop:`3px solid ${x.c}`,flex:1,textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,color:x.c}}>{x.v}</div>
          <div style={{fontSize:12,color:C.textSoft}}>{x.l}</div>
        </div>
      ))}
    </div>
    <div className="flex gap-8 mb-10 flex-wrap">
      <input className="input" style={{flex:1,minWidth:140}} placeholder="🔍 Search documents..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="input" style={{width:140}} value={fCat} onChange={e=>setFCat(e.target.value)}>
        {cats.map(c=><option key={c}>{c}</option>)}
      </select>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
      {filtDocs.map(d=><div key={d.id} style={{background:"#1a2236",borderRadius:12,padding:14,border:"1px solid #1f2e47",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{fontSize:28,marginBottom:8}}>{d.file_type==="PDF"?"📄":d.file_type==="Excel"?"📊":d.file_type==="Word"?"📝":"📁"}</div>
        <div style={{fontWeight:800,fontSize:13,marginBottom:4,color:"#1e3a5f"}}>{d.title}</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{d.description?.slice(0,50)||""}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          {badge(C.blue,d.category||"—")}
          <div style={{display:"flex",gap:4}}>
            {d.file_url&&<a href={d.file_url} target="_blank" style={{fontSize:12,color:C.accent,textDecoration:"none",fontWeight:700}}>⬇️</a>}
            <button className="btn-ghost" style={{padding:"2px 6px",fontSize:11}} onClick={()=>{setForm({title:d.title,category:d.category||"Policy",description:d.description||"",file_url:d.file_url||"",file_type:d.file_type||"PDF",access_level:d.access_level||"All Staff",academic_year:d.academic_year||new Date().getFullYear().toString()});setEditId(d.id);setModal(true);}}>✏️</button>
          </div>
        </div>
      </div>)}
    </div>
    {filtDocs.length===0&&<div className="card" style={{textAlign:"center",color:C.muted,padding:24}}>No documents found</div>}
    {modal&&<div className="overlay"><div className="modal">
      <div style={{fontWeight:900,fontSize:16,marginBottom:14}}>{editId?"✏️ Edit Document":"📂 Add Document"}</div>
      <div className="grid-2">
        <div className="grid-full"><Field label="Title *" value={form.title} onChange={v=>setForm(f=>({...f,title:v}))}/></div>
        <div><Select label="Category" value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={["Policy","Form","Report","Circular","Minutes","Certificate","Contract","Other"]}/></div>
        <div><Select label="File Type" value={form.file_type} onChange={v=>setForm(f=>({...f,file_type:v}))} options={["PDF","Word","Excel","Image","Other"]}/></div>
        <div><Select label="Access Level" value={form.access_level} onChange={v=>setForm(f=>({...f,access_level:v}))} options={["All Staff","Admin Only","Teachers","Parents"]}/></div>
        <div><Field label="Academic Year" value={form.academic_year} onChange={v=>setForm(f=>({...f,academic_year:v}))}/></div>
        <div><Field label="File URL (optional)" value={form.file_url} onChange={v=>setForm(f=>({...f,file_url:v}))}/></div>
        <div className="grid-full"><label className="label">Description</label><textarea className="input" style={{height:60,resize:"vertical"}} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></div>
      </div>
      <div className="flex gap-8 justify-between" style={{marginTop:14}}>
        <button className="btn-ghost" onClick={()=>{setModal(false);setEditId(null);}}>Cancel</button>
        <button className="btn" onClick={save}>💾 Save Document</button>
      </div>
    </div></div>}
  </div>;
}
