<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Najman Education Centre — School Management v7.0</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b1120;font-family:'Nunito',sans-serif;color:#e8edf5;min-height:100vh;font-weight:700;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#111827;}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#f5a623,#e8890a);border-radius:10px;}
input,select,textarea{font-family:'Nunito',sans-serif;font-weight:700;}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:200px;height:100vh;
  background:linear-gradient(180deg,#111827 0%,#0d1526 60%,#0a1020 100%);
  border-right:1px solid #1f2e47;display:flex;flex-direction:column;z-index:100;overflow-y:auto;
  box-shadow:4px 0 24px rgba(0,0,0,.35);}
.main{margin-left:200px;padding:22px 20px;min-height:100vh;background:#0b1120;}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:301;
  background:linear-gradient(135deg,#f5a623,#e8890a);
  border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:18px;color:#fff;
  box-shadow:0 4px 12px rgba(245,166,35,.4);}
@media(max-width:600px){
  .sidebar{transform:translateX(-100%);transition:.3s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0!important;padding:12px!important;}
  .hamburger{display:flex!important;}
  .table{font-size:11px;}
  .table th,.table td{padding:8px 6px;}
}

/* NAV */
.nav-item{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;
  border-left:3px solid transparent;font-size:13px;font-weight:700;color:#94a3b8;
  transition:all .2s;border-radius:0 10px 10px 0;margin:1px 8px 1px 0;}
.nav-item:hover{background:rgba(245,166,35,.12);color:#fbbf24;border-left-color:rgba(245,166,35,.6);}
.nav-item.active{background:rgba(245,166,35,.16);border-left-color:#f5a623;color:#f5a623;font-weight:900;}
.nav-group{padding:14px 16px 4px;font-size:9px;color:#4a7fa5;font-weight:900;letter-spacing:3px;text-transform:uppercase;}

/* CARDS */
.card{background:#1a2236;border:1px solid #1f2e47;border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.stat-card{background:#1a2236;border:1px solid #1f2e47;border-radius:16px;padding:20px;flex:1;box-shadow:0 2px 10px rgba(0,0,0,.2);transition:transform .2s,box-shadow .2s;}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.35);}

/* BUTTONS */
.btn{background:linear-gradient(135deg,#f5a623,#e8890a);color:#fff;border:none;border-radius:10px;
  padding:10px 20px;font-weight:900;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;
  box-shadow:0 4px 12px rgba(245,166,35,.35);transition:all .2s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(245,166,35,.45);}
.btn:active{transform:translateY(0);}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.25);}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 12px rgba(34,197,94,.25);}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.25);}
.btn-ghost{background:#151d30;color:#cbd5e1;
  border:1.5px solid #1f2e47;border-radius:10px;
  padding:9px 18px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;
  transition:all .2s;}
.btn-ghost:hover{border-color:#f5a623;color:#fbbf24;background:#1f1708;}

/* INPUTS */
.input{background:#0d1526;border:1.5px solid #263449;border-radius:10px;padding:10px 14px;color:#e8edf5;font-size:14px;font-weight:700;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;}
.input:focus{border-color:#f5a623;box-shadow:0 0 0 3px rgba(245,166,35,.15);}
select.input option{background:#0d1526;color:#e8edf5;font-weight:700;}
.label{font-size:11px;color:#94a3b8;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:block;}

/* TABLE */
.table{width:100%;border-collapse:collapse;font-size:14px;}
.table th{text-align:left;padding:12px 14px;background:#111827;color:#94a3b8;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;border-bottom:2px solid #1f2e47;}
.table td{padding:12px 14px;border-bottom:1px solid #1f2e47;color:#e8edf5;font-weight:700;vertical-align:middle;}
.table tr:hover td{background:#1f1708;}
.table thead tr th:first-child{border-radius:10px 0 0 0;}
.table thead tr th:last-child{border-radius:0 10px 0 0;}

/* BADGE */
.badge{border-radius:20px;padding:4px 11px;font-size:11px;font-weight:800;display:inline-block;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(6px);}
.modal{background:#1a2236;border:1px solid #1f2e47;border-radius:20px;padding:28px;width:490px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.4);}

/* TABS */
.tab-btn{background:#151d30;color:#cbd5e1;
  border:1.5px solid #1f2e47;border-radius:10px;
  padding:8px 16px;font-weight:800;font-size:13px;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:all .2s;}
.tab-btn:hover{border-color:rgba(245,166,35,.5);color:#fbbf24;background:#1f1708;}
.tab-btn.active{background:linear-gradient(135deg,#f5a623,#e8890a);color:#fff;border-color:#f5a623;font-weight:900;}

/* SPINNER */
.spinner{display:flex;justify-content:center;padding:40px;}
.spinner::after{content:'';width:38px;height:38px;
  border:3px solid rgba(245,166,35,.2);border-top-color:#f5a623;
  border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* V4.0 NEW STYLES */
.chart-bar{transition:height .4s ease,background .2s;}
.chart-bar:hover{filter:brightness(1.15);}
.notif-item{border-left:3px solid #f5a623;padding:10px 14px;margin-bottom:8px;background:#1a2236;border-radius:0 10px 10px 0;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.notif-item.urgent{border-left-color:#dc2626;background:#2a1414;}
.notif-item.info{border-left-color:#2563eb;background:#101f33;}
.notif-item.success{border-left-color:#16a34a;background:#0f2318;}
.quick-action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.quick-action-btn{background:#1a2236;border:1.5px solid #1f2e47;border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;}
.quick-action-btn:hover{border-color:#f5a623;background:#1f1708;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,166,35,.25);}
.v4-badge{background:linear-gradient(135deg,#f5a623,#e8890a);color:#fff;font-size:9px;font-weight:900;padding:2px 6px;border-radius:10px;letter-spacing:1px;margin-left:4px;vertical-align:middle;}
.sms-tab-content{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{text-align:center;padding:6px 2px;border-radius:6px;font-size:12px;font-weight:700;cursor:default;}
.cal-day.today{background:linear-gradient(135deg,#f5a623,#e8890a);color:#fff;}
.cal-day.has-event{background:rgba(245,166,35,.18);color:#fbbf24;}
.cal-day.other-month{color:#3b4a63;}

/* ALERTS */
.error-box{background:#2a1414;border:1px solid #7f1d1d;
  border-radius:10px;padding:12px 15px;font-size:14px;font-weight:700;color:#fca5a5;margin-bottom:14px;}
.success-box{background:#0f2318;border:1px solid #166534;
  border-radius:10px;padding:12px 15px;font-size:14px;font-weight:700;color:#86efac;margin-bottom:14px;}

/* GRID & FLEX UTILS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-full{grid-column:1/-1;}
.flex{display:flex;}.flex-wrap{flex-wrap:wrap;}
.gap-8{gap:8px;}.gap-10{gap:10px;}.gap-12{gap:12px;}.gap-14{gap:14px;}.gap-16{gap:16px;}
.mb-8{margin-bottom:8px;}.mb-10{margin-bottom:10px;}.mb-12{margin-bottom:12px;}
.mb-14{margin-bottom:14px;}.mb-16{margin-bottom:16px;}
.fw-700{font-weight:700;}.fw-900{font-weight:900;}
.fs-10{font-size:11px;}.fs-11{font-size:12px;}.fs-12{font-size:13px;}.fs-13{font-size:14px;}
.text-muted{color:#94a3b8;font-weight:700;}.text-soft{color:#cbd5e1;font-weight:700;}
.text-accent{color:#f5a623;}.text-green{color:#4ade80;}.text-red{color:#f87171;}
.justify-between{justify-content:space-between;}.align-center{align-items:center;}
.w-full{width:100%;}.text-center{text-align:center;}
</style>

// Auto-refresh mechanism: whenever APP_VERSION changes (bumped on every update),
// force a one-time hard reload + clear any stale service-worker caches, so
// the person never has to manually "Clear site data" again.
window.__APP_VERSION = "2026-07-18-011";
(function(){
  try{
    var stored = localStorage.getItem("najman_app_version");
    if(stored && stored !== window.__APP_VERSION){
      localStorage.setItem("najman_app_version", window.__APP_VERSION);
      if('caches' in window){
        caches.keys().then(function(names){
          return Promise.all(names.map(function(n){ return caches.delete(n); }));
        }).finally(function(){
          if('serviceWorker' in navigator){
            navigator.serviceWorker.getRegistrations().then(function(regs){
              regs.forEach(function(r){ r.unregister(); });
            }).finally(function(){ location.reload(true); });
          } else {
            location.reload(true);
          }
        });
      } else {
        location.reload(true);
      }
    } else if(!stored){
      localStorage.setItem("najman_app_version", window.__APP_VERSION);
    }
  }catch(e){}
})();
</script>

  <style>
    body{font-family:Georgia,'Times New Roman',serif;max-width:720px;margin:auto;padding:30px;font-size:13px;color:#1a1a1a;line-height:1.6;}
    .hd{text-align:center;border-bottom:3px solid #e8890a;padding-bottom:14px;margin-bottom:20px;}
    .hd .school{font-size:20px;font-weight:900;letter-spacing:1px;}
    .hd .addr{font-size:11px;color:#555;margin-top:2px;}
    .hd .title{font-size:15px;font-weight:700;margin-top:10px;text-transform:uppercase;letter-spacing:1px;color:#e8890a;}
    h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #ddd;padding-bottom:4px;margin:18px 0 8px;color:#333;}
    .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dotted #eee;}
    .row b{color:#444;}
    p.body-text{margin:6px 0;text-align:justify;}
    .sig-block{display:flex;justify-content:space-between;margin-top:40px;flex-wrap:wrap;}
    .sig{width:45%;text-align:center;margin-top:20px;}
    .sig .line{border-top:1px solid #333;margin-top:40px;padding-top:6px;font-size:12px;}
    .footer{font-size:10px;text-align:center;margin-top:30px;color:#999;border-top:1px solid #eee;padding-top:10px;}
    @media print{ body{padding:10px;} }
  </style></head><body>
  <div class="hd">
    <div class="school">NAJMAN EDUCATION CENTRE</div>
    <div class="addr">Kishili, Mwanza, Tanzania &nbsp;\u2022&nbsp; +255 742 415 133</div>
    <div class="title">${o}</div>
  </div>

  <p class="body-text">Huu ni mkataba wa ajira kati ya <b>Najman Education Centre</b> ("Mwajiri") na <b>${s.full_name||"\u2014"}</b> ("Mfanyakazi"), unaoanza tarehe <b>${s.contract_start_date||"\u2014"}</b>.</p>

  <h3>1. Taarifa za Pande Zote</h3>
  <div class="row"><span>Jina Kamili</span><b>${s.full_name||"\u2014"}</b></div>
  <div class="row"><span>Namba ya Kitambulisho (NIDA)</span><b>${s.national_id||"\u2014"}</b></div>
  <div class="row"><span>Namba ya Simu</span><b>${s.phone?"+"+s.phone:"\u2014"}</b></div>
  <div class="row"><span>Anuani / Makazi</span><b>${s.address||"\u2014"}</b></div>
  <div class="row"><span>Elimu / Taaluma</span><b>${s.qualification||"\u2014"} (${s.education_level||"\u2014"})</b></div>

  <h3>2. Nafasi ya Kazi</h3>
  <div class="row"><span>Wadhifa</span><b>${s.position||"\u2014"}</b></div>
  <div class="row"><span>Idara</span><b>${s.department||"\u2014"}</b></div>
  <div class="row"><span>Aina ya Mkataba</span><b>${s.contract_type||"\u2014"}</b></div>

  <h3>3. Tarehe ya Kuanza Kazi</h3>
  <div class="row"><span>Tarehe ya Kuanza</span><b>${s.contract_start_date||"\u2014"}</b></div>
  <div class="row"><span>Tarehe ya Kumaliza</span><b>${s.contract_end_date||"Inaendelea"}</b></div>

  <h3>4. Kipindi cha Majaribio</h3>
  <p class="body-text">Mfanyakazi atakuwa kwenye kipindi cha majaribio cha <b>${s.probation_period||"\u2014"}</b> kuanzia tarehe ya kuanza kazi.</p>

  <h3>5. Muda wa Kazi</h3>
  <div class="row"><span>Muda wa Mkataba</span><b>${s.contract_duration||"\u2014"}</b></div>
  <div class="row"><span>Masaa ya Kazi</span><b>${s.working_hours||"\u2014"}</b></div>

  <h3>6. Mshahara na Malipo</h3>
  <div class="row"><span>Mshahara wa Msingi</span><b>TZS ${Number(s.basic_salary||0).toLocaleString()}</b></div>
  <div class="row"><span>Tarehe ya Malipo</span><b>${s.salary_payment_date||"\u2014"}</b></div>

  <h3>7. Posho</h3>
  <p class="body-text">${Number(s.allowances||0)>0?`Mfanyakazi atalipwa posho ya <b>TZS ${Number(s.allowances).toLocaleString()}</b> kwa mwezi, kwa mujibu wa masharti ya shule.`:"Hakuna posho maalum iliyowekwa kwa nafasi hii kwa sasa."}</p>

  <h3>8. Majukumu ya Mwalimu</h3>
  <p class="body-text">${(s.responsibilities||"Kama atakavyoelekezwa na Uongozi wa Shule.").replace(/\n/g,"<br/>")}</p>

  <h3>9. Nidhamu</h3>
  <p class="body-text">Mfanyakazi anatakiwa kuzingatia nidhamu ya kazi, kanuni na taratibu za shule wakati wote. Uvunjifu wa nidhamu utashughulikiwa kwa mujibu wa kanuni za shule na sheria za kazi za Tanzania.</p>

  <h3>10. Likizo</h3>
  <p class="body-text">Mfanyakazi anastahili likizo ya siku <b>${s.leave_days||"\u2014"}</b> kwa mwaka, kwa mujibu wa sheria za kazi za Tanzania na taratibu za shule.</p>

  <h3>11. Ruhusa</h3>
  <p class="body-text">Mfanyakazi anatakiwa kuomba ruhusa mapema kwa maandishi kwa Uongozi wa Shule kabla ya kutokuwepo kazini, isipokuwa dharura za kiafya au nyingine za lazima ambazo zitatakiwa kutolewa taarifa haraka iwezekanavyo.</p>

  <h3>12. Siri za Shule</h3>
  <p class="body-text">Mfanyakazi hatatoa au kutumia taarifa za siri za shule, wanafunzi, wafanyakazi wenzake, au uendeshaji wa shule kwa mtu au taasisi yoyote nje ya shule bila idhini ya Uongozi.</p>

  <h3>13. Mali za Shule</h3>
  <p class="body-text">Mfanyakazi atatunza mali zote za shule alizokabidhiwa kwa ajili ya kazi zake, na atazirudisha kwa hali nzuri endapo ajira itasitishwa au kumalizika.</p>

  <h3>14. Tathmini ya Kazi</h3>
  <p class="body-text">Utendaji wa mfanyakazi utatathminiwa mara kwa mara na Uongozi wa Shule kulingana na malengo na viwango vya utendaji vilivyowekwa.</p>

  <h3>15. Kusitisha Ajira</h3>
  <p class="body-text">Pande zote zitatoa taarifa ya maandishi ya <b>${s.termination_notice||"siku 30"}</b> kabla ya kusitisha ajira, isipokuwa pale sheria inaporuhusu kusitisha mara moja kutokana na kosa kubwa la kinidhamu. Badala ya notisi, mshahara wa kipindi cha notisi unaweza kulipwa. Mfanyakazi atakabidhi mali zote za shule kabla ya kuondoka.</p>

  <h3>16. Kanuni za Shule</h3>
  <p class="body-text">Mfanyakazi anakubali kuzingatia na kufuata kanuni, taratibu, na sera zote za Najman Education Centre kama zilivyowekwa na Uongozi, ikiwemo mabadiliko yoyote yatakayofanyika baadaye.</p>

  <h3>17. Tamko na Saini</h3>
  <p class="body-text">Kwa kutia saini hapa chini, pande zote mbili zinathibitisha kuwa zimesoma, zimeelewa, na zinakubaliana na masharti yote yaliyoainishwa kwenye mkataba huu.</p>
